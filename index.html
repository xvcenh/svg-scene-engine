<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Scene Engine - AI Scene Adapter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 12px 20px;
      background: #12121a;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .status {
      font-size: 12px;
      color: #888;
    }
    .header .status.ready { color: #4ade80; }

    /* Main layout */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Scene panel (left) */
    .scene-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #scene-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0f172a;
    }

    /* Chat panel (right) */
    .chat-panel {
      width: 380px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #2a2a3a;
      background: #12121a;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .chat-msg {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 90%;
    }
    .chat-msg.user {
      background: #1e3a5f;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.ai {
      background: #1a1a2e;
      border-bottom-left-radius: 4px;
    }
    .chat-msg.system {
      background: transparent;
      color: #666;
      font-size: 12px;
      text-align: center;
      max-width: 100%;
    }
    .chat-input-area {
      padding: 12px;
      border-top: 1px solid #2a2a3a;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
    }
    #chat-input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
    }
    #chat-input:focus { border-color: #3b82f6; }
    #send-btn {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    #send-btn:hover { background: #2563eb; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .quick-btn {
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 5px 12px;
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
    }
    .quick-btn:hover { border-color: #3b82f6; color: #e0e0e0; }

    /* Settings modal */
    .settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .settings-overlay.active { display: flex; }
    .settings-modal {
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 24px;
      width: 400px;
      max-width: 90vw;
    }
    .settings-modal h2 { margin-bottom: 16px; font-size: 16px; }
    .settings-modal label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    .settings-modal input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    .settings-modal input:focus { border-color: #3b82f6; }
    .settings-modal .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      justify-content: flex-end;
    }
    .settings-modal button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-save { background: #3b82f6; color: white; }
    .btn-cancel { background: #2a2a3a; color: #ccc; }

    /* Asset catalog */
    .catalog-panel {
      display: none;
      position: fixed;
      right: 400px;
      top: 60px;
      bottom: 0;
      width: 280px;
      background: #12121a;
      border-left: 1px solid #2a2a3a;
      overflow-y: auto;
      z-index: 50;
      padding: 16px;
    }
    .catalog-panel.active { display: block; }
    .catalog-section h3 {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin: 12px 0 8px;
    }
    .catalog-item {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 4px 10px;
      margin: 2px;
      font-size: 11px;
      color: #94a3b8;
      cursor: pointer;
    }
    .catalog-item:hover { border-color: #3b82f6; color: #e0e0e0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ SVG Scene Engine</h1>
    <div style="display:flex;gap:12px;align-items:center;">
      <span id="engine-status" class="status">Loading...</span>
      <button class="quick-btn" onclick="toggleCatalog()">📦 Assets</button>
      <button class="quick-btn" onclick="openSettings()">⚙️ Settings</button>
    </div>
  </div>

  <div class="main">
    <div class="scene-panel">
      <div id="scene-container"></div>
    </div>

    <div class="chat-panel">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-msg system">Describe a scene in natural language, and the AI will compose matching SVG visuals.</div>
      </div>
      <div class="chat-input-area">
        <div class="quick-actions">
          <button class="quick-btn" onclick="quickScene('酒馆里，一位吟游诗人在弹奏，商人在喝酒')">🍺 酒馆</button>
          <button class="quick-btn" onclick="quickScene('森林入口，一个战士和一匹马站在路边')">🌲 森林</button>
          <button class="quick-btn" onclick="quickScene('集市上，商人和卫兵在交谈，远处有一座城堡')">🏰 集市</button>
          <button class="quick-btn" onclick="quickScene('洞穴中，法师在施法，周围有火焰特效')">🔥 战斗</button>
          <button class="quick-btn" onclick="clearScene()">🗑️ 清空</button>
        </div>
        <div class="chat-input-row">
          <textarea id="chat-input" rows="2" placeholder="Describe a scene..."></textarea>
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-modal">
      <h2>⚙️ LLM Settings</h2>
      <label>API Endpoint</label>
      <input id="cfg-endpoint" placeholder="https://api.openai.com/v1">
      <label>API Key</label>
      <input id="cfg-apikey" type="password" placeholder="sk-...">
      <label>Model</label>
      <input id="cfg-model" placeholder="gpt-4o-mini">
      <div class="btn-row">
        <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
        <button class="btn-save" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <!-- Asset catalog -->
  <div class="catalog-panel" id="catalog-panel"></div>

  <!-- Scripts (order matters) -->
  <script src="shared/js/event-bus.js"></script>
  <script src="shared/js/llm-client.js"></script>
  <script src="engine/js/scene-dsl.js"></script>
  <script src="engine/js/renderer.js"></script>
  <script src="engine/js/scene-manager.js"></script>
  <script src="engine/js/core.js"></script>

  <script>
    // ── Chat state ──
    let conversationHistory = [];
    let isProcessing = false;

    // ── Init ──
    async function init() {
      const statusEl = document.getElementById('engine-status');
      statusEl.textContent = 'Initializing...';

      LLMClient.loadConfig();

      await Engine.init();

      statusEl.textContent = LLMClient.isReady()
        ? `Ready (${SVGRenderer.loadedCount} assets)`
        : 'Configure LLM in Settings ⚙️';
      statusEl.className = 'status' + (LLMClient.isReady() ? ' ready' : '');

      buildCatalog();

      // Enter to send
      document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    }

    // ── Send message ──
    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || isProcessing) return;

      input.value = '';
      addMessage('user', text);
      isProcessing = true;
      document.getElementById('send-btn').disabled = true;

      try {
        const result = await Engine.describeScene(text, conversationHistory);

        conversationHistory.push({ role: 'user', content: text });
        conversationHistory.push({ role: 'assistant', content: JSON.stringify(result) });

        if (result.narration) {
          addMessage('ai', result.narration);
        }

        if (result.choices && result.choices.length > 0) {
          const choicesHtml = result.choices.map((c, i) =>
            `<button class="quick-btn" onclick="quickScene('${c.replace(/'/g, "\\'")}')">${i+1}. ${c}</button>`
          ).join('');
          addMessage('system', choicesHtml, true);
        }
      } catch (err) {
        addMessage('system', '❌ ' + err.message);
      }

      isProcessing = false;
      document.getElementById('send-btn').disabled = false;
    }

    function quickScene(text) {
      document.getElementById('chat-input').value = text;
      sendMessage();
    }

    function clearScene() {
      Engine.applyScene({ clear: true });
      addMessage('system', 'Scene cleared.');
    }

    function addMessage(type, content, isHtml = false) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `chat-msg ${type}`;
      if (isHtml) div.innerHTML = content;
      else div.textContent = content;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    // ── Settings ──
    function openSettings() {
      const cfg = JSON.parse(localStorage.getItem('svg-scene-engine-config') || '{}');
      document.getElementById('cfg-endpoint').value = cfg.endpoint || '';
      document.getElementById('cfg-apikey').value = cfg.apiKey || '';
      document.getElementById('cfg-model').value = cfg.model || 'gpt-4o-mini';
      document.getElementById('settings-overlay').classList.add('active');
    }

    function closeSettings() {
      document.getElementById('settings-overlay').classList.remove('active');
    }

    function saveSettings() {
      LLMClient.configure({
        endpoint: document.getElementById('cfg-endpoint').value.trim(),
        apiKey: document.getElementById('cfg-apikey').value.trim(),
        model: document.getElementById('cfg-model').value.trim()
      });
      LLMClient.saveConfig();
      closeSettings();

      const statusEl = document.getElementById('engine-status');
      statusEl.textContent = `Ready (${SVGRenderer.loadedCount} assets)`;
      statusEl.className = 'status ready';
    }

    // ── Asset Catalog ──
    function buildCatalog() {
      const catalog = SceneDSL.getAssetCatalog();
      const panel = document.getElementById('catalog-panel');
      let html = '<h3 style="margin-bottom:12px">📦 Asset Catalog</h3>';

      for (const [category, items] of Object.entries(catalog)) {
        html += `<div class="catalog-section"><h3>${category}</h3>`;
        for (const item of items) {
          html += `<span class="catalog-item" onclick="insertAsset('${item}')">${item}</span>`;
        }
        html += '</div>';
      }

      panel.innerHTML = html;
    }

    function toggleCatalog() {
      document.getElementById('catalog-panel').classList.toggle('active');
    }

    function insertAsset(id) {
      const input = document.getElementById('chat-input');
      input.value += (input.value ? ' ' : '') + id;
      input.focus();
    }

    // ── Start ──
    init();
  </script>
</body>
</html>
