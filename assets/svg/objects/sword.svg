<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 100"
  data-asset-id="sword"
  data-layer="object"
  data-tags="sword,weapon,blade,prop,combat"
  data-origin="center-bottom">
  <!-- Dark Fantasy Sword -->
  <defs>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a8a9a"/>
      <stop offset="30%" stop-color="#c0c0d0"/>
      <stop offset="50%" stop-color="#e0e0ee"/>
      <stop offset="70%" stop-color="#c0c0d0"/>
      <stop offset="100%" stop-color="#8a8a9a"/>
    </linearGradient>
  </defs>
  <!-- Blade -->
  <path d="M20 4 L16 58 L20 62 L24 58 L20 4Z" fill="url(#blade)" stroke="#6a6a7a" stroke-width="0.5"/>
  <!-- Blade fuller (groove) -->
  <line x1="20" y1="12" x2="20" y2="52" stroke="#aaa" stroke-width="1" opacity="0.4"/>
  <!-- Blade tip -->
  <path d="M18 8 L20 4 L22 8" fill="#d0d0dd" stroke="#9a9aaa" stroke-width="0.3"/>
  <!-- Crossguard -->
  <rect x="6" y="60" width="28" height="5" rx="2" fill="#c9a84c" stroke="#a08030" stroke-width="0.5"/>
  <!-- Crossguard details -->
  <circle cx="10" cy="62.5" r="1.5" fill="#a08030"/>
  <circle cx="30" cy="62.5" r="1.5" fill="#a08030"/>
  <rect x="8" y="61.5" width="24" height="1" rx="0.3" fill="#e0c060" opacity="0.5"/>
  <!-- Grip -->
  <rect x="16" y="65" width="8" height="20" rx="1" fill="#4a2a1a" stroke="#3a1a0a" stroke-width="0.3"/>
  <!-- Grip wrapping -->
  <line x1="16" y1="68" x2="24" y2="71" stroke="#3a1a0a" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="72" x2="24" y2="75" stroke="#3a1a0a" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="76" x2="24" y2="79" stroke="#3a1a0a" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="80" x2="24" y2="83" stroke="#3a1a0a" stroke-width="1" opacity="0.6"/>
  <!-- Pommel -->
  <circle cx="20" cy="88" r="5" fill="#c9a84c" stroke="#a08030" stroke-width="0.5"/>
  <circle cx="20" cy="88" r="2" fill="#a08030"/>
  <!-- Pommel gem -->
  <circle cx="20" cy="88" r="1.2" fill="#8b1a1a"/>
</svg>