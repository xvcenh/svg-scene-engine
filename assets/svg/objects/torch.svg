<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 100"
  data-asset-id="torch"
  data-layer="object"
  data-tags="torch,wall,fire,light,prop,flame"
  data-origin="center-bottom">
  <!-- Dark Fantasy Wall Torch -->
  <defs>
    <radialGradient id="flame-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffaa00" opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6600" opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="40%" stop-color="#ff8800"/>
      <stop offset="70%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ffee88"/>
    </linearGradient>
  </defs>
  <!-- Glow halo -->
  <circle cx="20" cy="20" r="25" fill="url(#flame-glow)"/>
  <!-- Wall bracket -->
  <rect x="14" y="60" width="12" height="8" rx="1" fill="#4a4a5a" stroke="#3a3a4a" stroke-width="0.5"/>
  <rect x="16" y="56" width="8" height="6" rx="1" fill="#5a5a6a" stroke="#4a4a5a" stroke-width="0.3"/>
  <!-- Torch handle -->
  <rect x="17" y="30" width="6" height="32" rx="1" fill="#5a3a1a" stroke="#4a2a1a" stroke-width="0.3"/>
  <!-- Handle wrapping -->
  <rect x="16" y="38" width="8" height="3" rx="0.5" fill="#3a2a1a"/>
  <rect x="16" y="44" width="8" height="3" rx="0.5" fill="#3a2a1a"/>
  <rect x="16" y="50" width="8" height="3" rx="0.5" fill="#3a2a1a"/>
  <!-- Fuel / wick top -->
  <rect x="16" y="28" width="8" height="6" rx="1" fill="#3a2a1a"/>
  <!-- Flame outer -->
  <path d="M20 28 Q14 18 16 10 Q18 4 20 2 Q22 4 24 10 Q26 18 20 28Z" fill="url(#flame)" opacity="0.9">
    <animate attributeName="d" dur="0.5s" repeatCount="indefinite"
      values="M20 28 Q14 18 16 10 Q18 4 20 2 Q22 4 24 10 Q26 18 20 28Z;
              M20 28 Q13 18 15 8 Q17 3 20 1 Q23 3 25 8 Q27 18 20 28Z;
              M20 28 Q14 18 16 10 Q18 4 20 2 Q22 4 24 10 Q26 18 20 28Z"/>
  </path>
  <!-- Flame inner -->
  <path d="M20 26 Q16 20 18 14 Q19 10 20 8 Q21 10 22 14 Q24 20 20 26Z" fill="#ffee88" opacity="0.8">
    <animate attributeName="d" dur="0.3s" repeatCount="indefinite"
      values="M20 26 Q16 20 18 14 Q19 10 20 8 Q21 10 22 14 Q24 20 20 26Z;
              M20 26 Q15 20 17 12 Q18 8 20 6 Q22 8 23 12 Q25 20 20 26Z;
              M20 26 Q16 20 18 14 Q19 10 20 8 Q21 10 22 14 Q24 20 20 26Z"/>
  </path>
  <!-- Sparks -->
  <circle cx="16" cy="8" r="1" fill="#ffcc00" opacity="0.6">
    <animate attributeName="cy" dur="1s" repeatCount="indefinite" values="8;2;8"/>
    <animate attributeName="opacity" dur="1s" repeatCount="indefinite" values="0.6;0;0.6"/>
  </circle>
  <circle cx="24" cy="6" r="0.8" fill="#ffaa00" opacity="0.5">
    <animate attributeName="cy" dur="1.2s" repeatCount="indefinite" values="6;0;6"/>
    <animate attributeName="opacity" dur="1.2s" repeatCount="indefinite" values="0.5;0;0.5"/>
  </circle>
  <!-- Wall mount screws -->
  <circle cx="16" cy="62" r="1.5" fill="#6a6a7a"/>
  <circle cx="24" cy="62" r="1.5" fill="#6a6a7a"/>
</svg>