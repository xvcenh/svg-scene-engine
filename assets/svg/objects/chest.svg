<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80"
  data-asset-id="chest"
  data-layer="object"
  data-tags="chest,treasure,loot,prop,container"
  data-origin="center-bottom">
  <!-- Dark Fantasy Treasure Chest -->
  <defs>
    <linearGradient id="chest-wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4a2a"/>
      <stop offset="100%" stop-color="#4a2a1a"/>
    </linearGradient>
    <linearGradient id="chest-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5a3a"/>
      <stop offset="100%" stop-color="#5a3a1a"/>
    </linearGradient>
  </defs>
  <!-- Chest body -->
  <rect x="10" y="35" width="60" height="30" rx="2" fill="url(#chest-wood)" stroke="#3a1a0a" stroke-width="0.8"/>
  <!-- Chest lid -->
  <path d="M10 35 Q10 18 40 15 Q70 18 70 35 L10 35Z" fill="url(#chest-lid)" stroke="#3a1a0a" stroke-width="0.8"/>
  <!-- Metal bands - body -->
  <rect x="10" y="42" width="60" height="4" rx="0.5" fill="#5a5a6a" stroke="#4a4a5a" stroke-width="0.3"/>
  <rect x="10" y="55" width="60" height="4" rx="0.5" fill="#5a5a6a" stroke="#4a4a5a" stroke-width="0.3"/>
  <!-- Metal bands - lid -->
  <path d="M14 33 Q14 22 40 19 Q66 22 66 33" fill="none" stroke="#5a5a6a" stroke-width="2"/>
  <!-- Corner reinforcements -->
  <rect x="10" y="33" width="4" height="32" rx="0.5" fill="#5a5a6a"/>
  <rect x="66" y="33" width="4" height="32" rx="0.5" fill="#5a5a6a"/>
  <!-- Lock plate -->
  <rect x="34" y="32" width="12" height="10" rx="1" fill="#c9a84c" stroke="#a08030" stroke-width="0.5"/>
  <!-- Keyhole -->
  <circle cx="40" cy="36" r="2" fill="#2a1a0a"/>
  <rect x="39" y="36" width="2" height="4" rx="0.5" fill="#2a1a0a"/>
  <!-- Lid hinges -->
  <rect x="20" y="33" width="6" height="4" rx="1" fill="#5a5a6a"/>
  <rect x="54" y="33" width="6" height="4" rx="1" fill="#5a5a6a"/>
  <!-- Wood grain lines -->
  <line x1="25" y1="40" x2="25" y2="62" stroke="#3a1a0a" stroke-width="0.3" opacity="0.4"/>
  <line x1="40" y1="40" x2="40" y2="62" stroke="#3a1a0a" stroke-width="0.3" opacity="0.4"/>
  <line x1="55" y1="40" x2="55" y2="62" stroke="#3a1a0a" stroke-width="0.3" opacity="0.4"/>
  <!-- Shadow -->
  <ellipse cx="40" cy="68" rx="30" ry="3" fill="#000" opacity="0.15"/>
</svg>