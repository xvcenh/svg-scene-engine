<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 80"
  data-asset-id="potion"
  data-layer="object"
  data-tags="potion,bottle,elixir,prop,magic,consumable"
  data-origin="center-bottom">
  <!-- Dark Fantasy Potion Bottle -->
  <defs>
    <linearGradient id="potion-liquid" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#44dd44"/>
      <stop offset="100%" stop-color="#116611"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" opacity="0.12"/>
    </linearGradient>
  </defs>
  <!-- Bottle body -->
  <path d="M12 30 Q12 26 16 24 L16 18 Q16 14 14 14 L14 12 Q14 10 18 10 L22 10 Q26 10 26 12 L26 14 Q24 14 24 18 L24 24 Q28 26 28 30 L28 68 Q28 72 24 72 L16 72 Q12 72 12 68Z" fill="#aabbcc" stroke="#778899" stroke-width="0.5" opacity="0.6"/>
  <!-- Liquid -->
  <path d="M13 35 L13 67 Q13 71 17 71 L23 71 Q27 71 27 67 L27 35 Q20 32 13 35Z" fill="url(#potion-liquid)" opacity="0.8"/>
  <!-- Liquid surface -->
  <path d="M13 35 Q20 32 27 35 Q20 38 13 35Z" fill="#66ee66" opacity="0.5"/>
  <!-- Bottle neck -->
  <rect x="16" y="12" width="8" height="14" rx="1" fill="#aabbcc" stroke="#778899" stroke-width="0.3" opacity="0.5"/>
  <!-- Cork -->
  <rect x="15" y="8" width="10" height="5" rx="2" fill="#8a6a2a" stroke="#6a4a1a" stroke-width="0.3"/>
  <line x1="17" y1="9" x2="17" y2="12" stroke="#6a4a1a" stroke-width="0.3"/>
  <line x1="20" y1="9" x2="20" y2="12" stroke="#6a4a1a" stroke-width="0.3"/>
  <line x1="23" y1="9" x2="23" y2="12" stroke="#6a4a1a" stroke-width="0.3"/>
  <!-- Glass shine -->
  <path d="M15 30 L15 65 Q15 68 17 68 L17 30 Q15 28 15 30Z" fill="url(#glass)"/>
  <!-- Bubbles -->
  <circle cx="18" cy="50" r="1.5" fill="#88ff88" opacity="0.4"/>
  <circle cx="22" cy="58" r="1" fill="#88ff88" opacity="0.3"/>
  <circle cx="20" cy="44" r="1.2" fill="#88ff88" opacity="0.35"/>
  <!-- Label -->
  <rect x="14" y="45" width="12" height="10" rx="1" fill="#d4c4a0" stroke="#a09070" stroke-width="0.3" opacity="0.8"/>
  <line x1="16" y1="48" x2="24" y2="48" stroke="#8a7a5a" stroke-width="0.3"/>
  <line x1="16" y1="51" x2="22" y2="51" stroke="#8a7a5a" stroke-width="0.3"/>
  <!-- Shadow -->
  <ellipse cx="20" cy="75" rx="10" ry="2" fill="#000" opacity="0.15"/>
</svg>