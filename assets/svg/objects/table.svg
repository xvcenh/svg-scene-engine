<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80"
  data-asset-id="table"
  data-layer="object"
  data-tags="table,furniture,wooden,tavern,prop"
  data-origin="center-bottom">
  <!-- Dark Fantasy Wooden Table -->
  <!-- Table top -->
  <rect x="8" y="15" width="104" height="8" rx="2" fill="#6a4a2a" stroke="#4a2a1a" stroke-width="0.5"/>
  <!-- Table top grain lines -->
  <line x1="20" y1="17" x2="20" y2="21" stroke="#5a3a1a" stroke-width="0.5" opacity="0.5"/>
  <line x1="40" y1="17" x2="40" y2="21" stroke="#5a3a1a" stroke-width="0.5" opacity="0.5"/>
  <line x1="60" y1="17" x2="60" y2="21" stroke="#5a3a1a" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="17" x2="80" y2="21" stroke="#5a3a1a" stroke-width="0.5" opacity="0.5"/>
  <line x1="100" y1="17" x2="100" y2="21" stroke="#5a3a1a" stroke-width="0.5" opacity="0.5"/>
  <!-- Front apron -->
  <rect x="14" y="23" width="92" height="6" rx="1" fill="#5a3a1a"/>
  <!-- Legs -->
  <rect x="16" y="29" width="6" height="46" rx="1" fill="#5a3a1a" stroke="#4a2a1a" stroke-width="0.3"/>
  <rect x="98" y="29" width="6" height="46" rx="1" fill="#5a3a1a" stroke="#4a2a1a" stroke-width="0.3"/>
  <!-- Cross brace -->
  <rect x="22" y="55" width="76" height="4" rx="1" fill="#4a2a1a"/>
  <!-- Leg detail / feet -->
  <rect x="14" y="72" width="10" height="4" rx="1" fill="#4a2a1a"/>
  <rect x="96" y="72" width="10" height="4" rx="1" fill="#4a2a1a"/>
  <!-- Shadow underneath -->
  <ellipse cx="60" cy="78" rx="40" ry="2" fill="#000" opacity="0.15"/>
</svg>