<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"
  data-asset-id="fog"
  data-layer="effect"
  data-tags="fog,mist,overlay,atmosphere,effect,weather"
  data-origin="center-center">
  <!-- Dark Fantasy Fog Overlay -->
  <defs>
    <filter id="fog-blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="fog-blur-lg">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <linearGradient id="fog-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aaaacc" stop-opacity="0"/>
      <stop offset="40%" stop-color="#8888aa" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#666688" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#444466" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <!-- Base fog layer -->
  <rect x="0" y="0" width="200" height="200" fill="url(#fog-fade)"/>
  <!-- Fog banks -->
  <ellipse cx="50" cy="160" rx="80" ry="30" fill="#7777aa" opacity="0.2" filter="url(#fog-blur-lg)">
    <animate attributeName="cx" dur="8s" repeatCount="indefinite" values="50;70;50"/>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0.2;0.3;0.2"/>
  </ellipse>
  <ellipse cx="160" cy="140" rx="70" ry="25" fill="#8888bb" opacity="0.18" filter="url(#fog-blur-lg)">
    <animate attributeName="cx" dur="10s" repeatCount="indefinite" values="160;140;160"/>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" values="0.18;0.28;0.18"/>
  </ellipse>
  <ellipse cx="100" cy="180" rx="100" ry="20" fill="#6666aa" opacity="0.25" filter="url(#fog-blur-lg)">
    <animate attributeName="cx" dur="12s" repeatCount="indefinite" values="100;120;100"/>
  </ellipse>
  <!-- Mid-level wisps -->
  <ellipse cx="30" cy="120" rx="50" ry="15" fill="#9999bb" opacity="0.12" filter="url(#fog-blur)">
    <animate attributeName="cx" dur="6s" repeatCount="indefinite" values="30;50;30"/>
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" values="0.12;0.2;0.12"/>
  </ellipse>
  <ellipse cx="150" cy="100" rx="40" ry="12" fill="#8888aa" opacity="0.1" filter="url(#fog-blur)">
    <animate attributeName="cx" dur="7s" repeatCount="indefinite" values="150;130;150"/>
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.1;0.18;0.1"/>
  </ellipse>
  <ellipse cx="80" cy="90" rx="60" ry="10" fill="#aaaacc" opacity="0.08" filter="url(#fog-blur)">
    <animate attributeName="cx" dur="9s" repeatCount="indefinite" values="80;100;80"/>
  </ellipse>
  <!-- Upper haze -->
  <ellipse cx="100" cy="50" rx="90" ry="20" fill="#bbbbdd" opacity="0.05" filter="url(#fog-blur-lg)">
    <animate attributeName="cx" dur="14s" repeatCount="indefinite" values="100;110;100"/>
  </ellipse>
  <!-- Ground mist tendrils -->
  <path d="M0 190 Q30 175 60 185 Q90 195 120 180 Q150 165 180 180 Q200 190 200 200 L0 200Z" fill="#555577" opacity="0.3" filter="url(#fog-blur)">
    <animate attributeName="d" dur="5s" repeatCount="indefinite"
      values="M0 190 Q30 175 60 185 Q90 195 120 180 Q150 165 180 180 Q200 190 200 200 L0 200Z;
              M0 188 Q30 180 60 182 Q90 190 120 178 Q150 170 180 185 Q200 188 200 200 L0 200Z;
              M0 190 Q30 175 60 185 Q90 195 120 180 Q150 165 180 180 Q200 190 200 200 L0 200Z"/>
  </path>
</svg>