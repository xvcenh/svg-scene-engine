<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"
  data-asset-id="magic-sparkle"
  data-layer="effect"
  data-tags="magic,sparkle,particles,effect,glow,enchantment"
  data-origin="center-center">
  <!-- Dark Fantasy Magic Sparkle Effect -->
  <defs>
    <radialGradient id="sparkle-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#aa66ff" opacity="0.6"/>
      <stop offset="100%" stop-color="#aa66ff" opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Ambient glow -->
  <circle cx="100" cy="100" r="80" fill="url(#sparkle-glow)" opacity="0.3"/>
  <!-- Large sparkles (4-point stars) -->
  <g transform="translate(80,60)">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2Z" fill="#dd99ff" opacity="0.9">
      <animate attributeName="opacity" dur="1.5s" repeatCount="indefinite" values="0.9;0.3;0.9"/>
      <animateTransform attributeName="transform" type="scale" dur="1.5s" repeatCount="indefinite" values="1;0.6;1"/>
    </path>
  </g>
  <g transform="translate(140,80)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5Z" fill="#aaddff" opacity="0.8">
      <animate attributeName="opacity" dur="1.2s" repeatCount="indefinite" values="0.8;0.2;0.8"/>
      <animateTransform attributeName="transform" type="scale" dur="1.2s" repeatCount="indefinite" values="1;0.5;1"/>
    </path>
  </g>
  <g transform="translate(60,120)">
    <path d="M0,-7 L1.8,-1.8 L7,0 L1.8,1.8 L0,7 L-1.8,1.8 L-7,0 L-1.8,-1.8Z" fill="#ffaa66" opacity="0.7">
      <animate attributeName="opacity" dur="1.8s" repeatCount="indefinite" values="0.7;0.2;0.7"/>
      <animateTransform attributeName="transform" type="scale" dur="1.8s" repeatCount="indefinite" values="1;0.4;1"/>
    </path>
  </g>
  <g transform="translate(120,140)">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2Z" fill="#dd99ff" opacity="0.85">
      <animate attributeName="opacity" dur="1s" repeatCount="indefinite" values="0.85;0.3;0.85"/>
      <animateTransform attributeName="transform" type="scale" dur="1s" repeatCount="indefinite" values="1;0.5;1"/>
    </path>
  </g>
  <!-- Medium sparkles -->
  <circle cx="50" cy="80" r="3" fill="#bb88ff" opacity="0.7" filter="url(#blur-sm)">
    <animate attributeName="opacity" dur="0.8s" repeatCount="indefinite" values="0.7;0.1;0.7"/>
    <animate attributeName="r" dur="0.8s" repeatCount="indefinite" values="3;1;3"/>
  </circle>
  <circle cx="160" cy="60" r="2.5" fill="#88ccff" opacity="0.6" filter="url(#blur-sm)">
    <animate attributeName="opacity" dur="1.1s" repeatCount="indefinite" values="0.6;0.1;0.6"/>
    <animate attributeName="r" dur="1.1s" repeatCount="indefinite" values="2.5;0.8;2.5"/>
  </circle>
  <circle cx="100" cy="160" r="3" fill="#ff88aa" opacity="0.5" filter="url(#blur-sm)">
    <animate attributeName="opacity" dur="1.4s" repeatCount="indefinite" values="0.5;0.1;0.5"/>
  </circle>
  <!-- Small floating particles -->
  <circle cx="40" cy="40" r="1.5" fill="#dd99ff" opacity="0.5">
    <animate attributeName="cy" dur="3s" repeatCount="indefinite" values="40;30;40"/>
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.5;0;0.5"/>
  </circle>
  <circle cx="170" cy="120" r="1.2" fill="#aaddff" opacity="0.4">
    <animate attributeName="cy" dur="2.5s" repeatCount="indefinite" values="120;108;120"/>
    <animate attributeName="opacity" dur="2.5s" repeatCount="indefinite" values="0.4;0;0.4"/>
  </circle>
  <circle cx="130" cy="40" r="1" fill="#ffcc88" opacity="0.5">
    <animate attributeName="cy" dur="2s" repeatCount="indefinite" values="40;32;40"/>
    <animate attributeName="opacity" dur="2s" repeatCount="indefinite" values="0.5;0;0.5"/>
  </circle>
  <circle cx="30" cy="160" r="1.3" fill="#dd99ff" opacity="0.4">
    <animate attributeName="cy" dur="2.8s" repeatCount="indefinite" values="160;148;160"/>
    <animate attributeName="opacity" dur="2.8s" repeatCount="indefinite" values="0.4;0;0.4"/>
  </circle>
  <circle cx="150" cy="170" r="1" fill="#88ffaa" opacity="0.3">
    <animate attributeName="cy" dur="2.2s" repeatCount="indefinite" values="170;160;170"/>
    <animate attributeName="opacity" dur="2.2s" repeatCount="indefinite" values="0.3;0;0.3"/>
  </circle>
  <!-- Trailing wisps -->
  <path d="M70 90 Q80 85 90 90 Q100 95 110 88" fill="none" stroke="#bb88ff" stroke-width="1" opacity="0.3" filter="url(#blur-md)">
    <animate attributeName="opacity" dur="2s" repeatCount="indefinite" values="0.3;0;0.3"/>
  </path>
</svg>