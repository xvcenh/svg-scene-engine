<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"
  data-asset-id="fire"
  data-layer="effect"
  data-tags="fire,flame,effect,burning,heat,light"
  data-origin="center-bottom">
  <!-- Dark Fantasy Fire Effect -->
  <defs>
    <radialGradient id="fire-glow" cx="0.5" cy="0.8" r="0.5">
      <stop offset="0%" stop-color="#ff6600" opacity="0.3"/>
      <stop offset="100%" stop-color="#ff2200" opacity="0"/>
    </radialGradient>
    <filter id="fire-blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <linearGradient id="flame-outer" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#cc2200"/>
      <stop offset="40%" stop-color="#ff4400"/>
      <stop offset="70%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <linearGradient id="flame-mid" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop="#ffcc00"/>
    </linearGradient>
    <linearGradient id="flame-core" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffee88"/>
    </linearGradient>
  </defs>
  <!-- Ambient glow -->
  <circle cx="100" cy="150" r="80" fill="url(#fire-glow)"/>
  <!-- Outer flames -->
  <path d="M100 190 Q70 160 75 120 Q78 100 85 90 Q80 70 90 50 Q95 35 100 20 Q105 35 110 50 Q120 70 115 90 Q122 100 125 120 Q130 160 100 190Z" fill="url(#flame-outer)" opacity="0.8" filter="url(#fire-blur)">
    <animate attributeName="d" dur="0.6s" repeatCount="indefinite"
      values="M100 190 Q70 160 75 120 Q78 100 85 90 Q80 70 90 50 Q95 35 100 20 Q105 35 110 50 Q120 70 115 90 Q122 100 125 120 Q130 160 100 190Z;
              M100 190 Q65 155 72 115 Q76 95 82 85 Q78 65 88 42 Q94 28 100 14 Q106 28 112 42 Q122 65 118 85 Q124 95 128 115 Q135 155 100 190Z;
              M100 190 Q72 162 77 122 Q80 102 86 92 Q82 72 92 52 Q97 38 100 22 Q103 38 108 52 Q118 72 114 92 Q120 102 123 122 Q128 162 100 190Z;
              M100 190 Q70 160 75 120 Q78 100 85 90 Q80 70 90 50 Q95 35 100 20 Q105 35 110 50 Q120 70 115 90 Q122 100 125 120 Q130 160 100 190Z"/>
  </path>
  <!-- Left flame tongue -->
  <path d="M80 190 Q65 165 68 140 Q70 125 75 115 Q72 100 78 80 Q82 65 80 50 Q85 65 88 80 Q92 100 88 115 Q90 130 85 155 Q82 175 80 190Z" fill="url(#flame-outer)" opacity="0.7">
    <animate attributeName="d" dur="0.5s" repeatCount="indefinite"
      values="M80 190 Q65 165 68 140 Q70 125 75 115 Q72 100 78 80 Q82 65 80 50 Q85 65 88 80 Q92 100 88 115 Q90 130 85 155 Q82 175 80 190Z;
              M80 190 Q62 160 66 135 Q69 120 73 110 Q70 95 76 75 Q80 60 78 45 Q83 60 86 75 Q90 95 86 110 Q88 125 83 150 Q80 170 80 190Z;
              M80 190 Q65 165 68 140 Q70 125 75 115 Q72 100 78 80 Q82 65 80 50 Q85 65 88 80 Q92 100 88 115 Q90 130 85 155 Q82 175 80 190Z"/>
  </path>
  <!-- Right flame tongue -->
  <path d="M120 190 Q135 165 132 140 Q130 125 125 115 Q128 100 122 80 Q118 65 120 50 Q115 65 112 80 Q108 100 112 115 Q110 130 115 155 Q118 175 120 190Z" fill="url(#flame-outer)" opacity="0.7">
    <animate attributeName="d" dur="0.55s" repeatCount="indefinite"
      values="M120 190 Q135 165 132 140 Q130 125 125 115 Q128 100 122 80 Q118 65 120 50 Q115 65 112 80 Q108 100 112 115 Q110 130 115 155 Q118 175 120 190Z;
              M120 190 Q138 160 134 135 Q131 120 127 110 Q130 95 124 75 Q120 60 122 45 Q117 60 114 75 Q110 95 114 110 Q112 125 117 150 Q120 170 120 190Z;
              M120 190 Q135 165 132 140 Q130 125 125 115 Q128 100 122 80 Q118 65 120 50 Q115 65 112 80 Q108 100 112 115 Q110 130 115 155 Q118 175 120 190Z"/>
  </path>
  <!-- Mid flames -->
  <path d="M100 190 Q82 170 88 145 Q92 130 95 120 Q90 105 98 85 Q102 70 100 55 Q98 70 102 85 Q110 105 105 120 Q108 130 112 145 Q118 170 100 190Z" fill="url(#flame-mid)" opacity="0.9">
    <animate attributeName="d" dur="0.4s" repeatCount="indefinite"
      values="M100 190 Q82 170 88 145 Q92 130 95 120 Q90 105 98 85 Q102 70 100 55 Q98 70 102 85 Q110 105 105 120 Q108 130 112 145 Q118 170 100 190Z;
              M100 190 Q80 165 86 140 Q90 125 93 115 Q88 100 96 78 Q100 62 100 48 Q100 62 104 78 Q112 100 107 115 Q110 125 114 140 Q120 165 100 190Z;
              M100 190 Q82 170 88 145 Q92 130 95 120 Q90 105 98 85 Q102 70 100 55 Q98 70 102 85 Q110 105 105 120 Q108 130 112 145 Q118 170 100 190Z"/>
  </path>
  <!-- Core flame -->
  <path d="M100 190 Q90 175 94 155 Q96 145 98 135 Q95 120 100 100 Q105 120 102 135 Q104 145 106 155 Q110 175 100 190Z" fill="url(#flame-core)" opacity="0.95">
    <animate attributeName="d" dur="0.35s" repeatCount="indefinite"
      values="M100 190 Q90 175 94 155 Q96 145 98 135 Q95 120 100 100 Q105 120 102 135 Q104 145 106 155 Q110 175 100 190Z;
              M100 190 Q88 172 92 150 Q95 140 97 130 Q93 115 100 95 Q107 115 103 130 Q105 140 108 150 Q112 172 100 190Z;
              M100 190 Q90 175 94 155 Q96 145 98 135 Q95 120 100 100 Q105 120 102 135 Q104 145 106 155 Q110 175 100 190Z"/>
  </path>
  <!-- Embers / sparks -->
  <circle cx="90" cy="60" r="2" fill="#ffcc00" opacity="0.8">
    <animate attributeName="cy" dur="1.5s" repeatCount="indefinite" values="60;20;60"/>
    <animate attributeName="cx" dur="1.5s" repeatCount="indefinite" values="90;85;90"/>
    <animate attributeName="opacity" dur="1.5s" repeatCount="indefinite" values="0.8;0;0.8"/>
  </circle>
  <circle cx="110" cy="50" r="1.5" fill="#ffaa00" opacity="0.7">
    <animate attributeName="cy" dur="1.8s" repeatCount="indefinite" values="50;10;50"/>
    <animate attributeName="cx" dur="1.8s" repeatCount="indefinite" values="110;115;110"/>
    <animate attributeName="opacity" dur="1.8s" repeatCount="indefinite" values="0.7;0;0.7"/>
  </circle>
  <circle cx="100" cy="40" r="1.8" fill="#ff8800" opacity="0.6">
    <animate attributeName="cy" dur="2s" repeatCount="indefinite" values="40;5;40"/>
    <animate attributeName="opacity" dur="2s" repeatCount="indefinite" values="0.6;0;0.6"/>
  </circle>
  <circle cx="95" cy="70" r="1" fill="#ffee66" opacity="0.5">
    <animate attributeName="cy" dur="1.2s" repeatCount="indefinite" values="70;30;70"/>
    <animate attributeName="cx" dur="1.2s" repeatCount="indefinite" values="95;92;95"/>
    <animate attributeName="opacity" dur="1.2s" repeatCount="indefinite" values="0.5;0;0.5"/>
  </circle>
  <circle cx="108" cy="65" r="1.2" fill="#ffcc44" opacity="0.6">
    <animate attributeName="cy" dur="1.4s" repeatCount="indefinite" values="65;25;65"/>
    <animate attributeName="cx" dur="1.4s" repeatCount="indefinite" values="108;112;108"/>
    <animate attributeName="opacity" dur="1.4s" repeatCount="indefinite" values="0.6;0;0.6"/>
  </circle>
</svg>