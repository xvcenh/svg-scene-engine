<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-asset-id="bg-castle" data-layer="background" data-tags="castle,fortress,tower,gate">
  <rect width="800" height="500" fill="#4a6a8a"/>
  <!-- Ground -->
  <rect x="0" y="350" width="800" height="150" fill="#5a7a3a"/>
  <!-- Castle wall -->
  <rect x="100" y="150" width="600" height="200" fill="#6a6a6a"/>
  <!-- Battlements -->
  <g>
    <rect x="100" y="130" width="30" height="20" fill="#6a6a6a"/>
    <rect x="160" y="130" width="30" height="20" fill="#6a6a6a"/>
    <rect x="220" y="130" width="30" height="20" fill="#6a6a6a"/>
    <rect x="550" y="130" width="30" height="20" fill="#6a6a6a"/>
    <rect x="610" y="130" width="30" height="20" fill="#6a6a6a"/>
    <rect x="670" y="130" width="30" height="20" fill="#6a6a6a"/>
  </g>
  <!-- Gate -->
  <rect x="340" y="250" width="120" height="100" rx="60" fill="#3a2a1a"/>
  <rect x="340" y="300" width="120" height="50" fill="#3a2a1a"/>
  <!-- Portcullis -->
  <g stroke="#4a3a2a" stroke-width="3">
    <line x1="360" y1="250" x2="360" y2="350"/>
    <line x1="385" y1="250" x2="385" y2="350"/>
    <line x1="415" y1="250" x2="415" y2="350"/>
    <line x1="440" y1="250" x2="440" y2="350"/>
  </g>
  <!-- Left tower -->
  <rect x="120" y="80" width="80" height="270" fill="#5a5a5a"/>
  <polygon points="120,80 160,30 200,80" fill="#7a3030"/>
  <!-- Right tower -->
  <rect x="600" y="80" width="80" height="270" fill="#5a5a5a"/>
  <polygon points="600,80 640,30 680,80" fill="#7a3030"/>
  <!-- Windows -->
  <rect x="145" y="120" width="30" height="40" rx="15" fill="#2a2a40"/>
  <rect x="625" y="120" width="30" height="40" rx="15" fill="#2a2a40"/>
  <!-- Flag -->
  <rect x="158" y="20" width="3" height="30" fill="#4a3a2a"/>
  <polygon points="161,20 190,28 161,36" fill="#cc3333"/>
</svg>