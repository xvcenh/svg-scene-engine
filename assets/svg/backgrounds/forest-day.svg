<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' data-asset-id='forest-day' data-layer='background' data-tags='forest,day,nature,trees,outdoor' data-origin='center-bottom'>
  <defs>
    <linearGradient id="fd-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a1f"/>
      <stop offset="40%" stop-color="#3d4f2a"/>
      <stop offset="100%" stop-color="#1a2410"/>
    </linearGradient>
    <linearGradient id="fd-fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5a3a" stop-opacity="0"/>
      <stop offset="70%" stop-color="#3a4a2a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2a3a1a" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="fd-light" cx="0.5" cy="0.1" r="0.6">
      <stop offset="0%" stop-color="#5a6a3a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2a3a1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="fd-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#fd-sky)"/>
  <rect width="800" height="500" fill="url(#fd-light)"/>
  <!-- Distant trees -->
  <g opacity="0.4" filter="url(#fd-blur)">
    <polygon points="50,180 70,80 90,180" fill="#1a2a10"/>
    <polygon points="120,190 145,70 170,190" fill="#1a2a10"/>
    <polygon points="200,175 225,60 250,175" fill="#1a2a10"/>
    <polygon points="300,185 330,65 360,185" fill="#1a2a10"/>
    <polygon points="420,180 450,55 480,180" fill="#1a2a10"/>
    <polygon points="540,175 565,70 590,175" fill="#1a2a10"/>
    <polygon points="640,190 665,80 690,190" fill="#1a2a10"/>
    <polygon points="720,180 745,75 770,180" fill="#1a2a10"/>
  </g>
  <!-- Mid trees -->
  <g opacity="0.7">
    <!-- Tree 1 -->
    <rect x="75" y="220" width="10" height="120" fill="#2a1f10"/>
    <polygon points="30,240 80,80 130,240" fill="#2a3a15"/>
    <polygon points="40,200 80,100 120,200" fill="#334a1a"/>
    <!-- Tree 2 -->
    <rect x="195" y="210" width="12" height="130" fill="#2a1f10"/>
    <polygon points="145,230 201,60 257,230" fill="#2a3a15"/>
    <polygon points="155,190 201,80 247,190" fill="#334a1a"/>
    <!-- Tree 3 -->
    <rect x="595" y="215" width="11" height="125" fill="#2a1f10"/>
    <polygon points="545,235 600,65 655,235" fill="#2a3a15"/>
    <polygon points="555,195 600,85 645,195" fill="#334a1a"/>
    <!-- Tree 4 -->
    <rect x="715" y="220" width="10" height="120" fill="#2a1f10"/>
    <polygon points="670,240 720,80 770,240" fill="#2a3a15"/>
    <polygon points="680,200 720,100 760,200" fill="#334a1a"/>
  </g>
  <!-- Foreground trees -->
  <g>
    <!-- Large tree left -->
    <rect x="15" y="230" width="18" height="180" fill="#1f150a"/>
    <polygon points="-30,280 24,50 78,280" fill="#1f2a0f"/>
    <polygon points="-20,230 24,70 68,230" fill="#2a3a15"/>
    <polygon points="-10,190 24,90 58,190" fill="#334a1a"/>
    <!-- Large tree right -->
    <rect x="755" y="225" width="16" height="185" fill="#1f150a"/>
    <polygon points="710,275 763,45 816,275" fill="#1f2a0f"/>
    <polygon points="720,225 763,65 806,225" fill="#2a3a15"/>
    <polygon points="730,185 763,85 796,185" fill="#334a1a"/>
  </g>
  <!-- Ground -->
  <path d="M0,380 Q100,360 200,370 Q300,380 400,365 Q500,350 600,370 Q700,385 800,360 L800,500 L0,500 Z" fill="#1a1f0f"/>
  <path d="M0,400 Q150,385 300,395 Q450,405 600,390 Q700,380 800,395 L800,500 L0,500 Z" fill="#151a0a"/>
  <!-- Path -->
  <path d="M350,500 Q360,450 370,400 Q380,370 390,350 Q400,340 410,350 Q420,370 430,400 Q440,450 450,500" fill="#2a2510" stroke="#3a3520" stroke-width="1"/>
  <!-- Sun rays -->
  <g opacity="0.15">
    <polygon points="380,0 340,200 420,200" fill="#7a8a4a"/>
    <polygon points="420,0 380,200 460,200" fill="#7a8a4a"/>
    <polygon points="460,0 420,200 500,200" fill="#7a8a4a"/>
  </g>
  <!-- Fog -->
  <rect width="800" height="500" fill="url(#fd-fog)"/>
  <!-- Grass details -->
  <g fill="#2a3510" opacity="0.5">
    <path d="M50,390 L53,375 L56,390"/>
    <path d="M150,385 L153,370 L156,385"/>
    <path d="M250,395 L253,380 L256,395"/>
    <path d="M500,388 L503,373 L506,388"/>
    <path d="M600,392 L603,377 L606,392"/>
    <path d="M700,385 L703,370 L706,385"/>
  </g>
</svg>