<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' data-asset-id='tavern-interior' data-layer='background' data-tags='tavern,interior,bar,fireplace,cozy,indoor' data-origin='center-bottom'>
  <defs>
    <linearGradient id="ti-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f15"/>
      <stop offset="100%" stop-color="#1a150f"/>
    </linearGradient>
    <radialGradient id="ti-fire" cx="0.85" cy="0.55" r="0.35">
      <stop offset="0%" stop-color="#8a3a0a" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#5a2005" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a1008" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ti-lantern" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#8a6a20" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2a1f10" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ti-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1810"/>
      <stop offset="100%" stop-color="#15100a"/>
    </linearGradient>
    <filter id="ti-glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <!-- Back wall -->
  <rect width="800" height="500" fill="url(#ti-wall)"/>
  <!-- Stone wall texture -->
  <g fill="none" stroke="#352a1f" stroke-width="1" opacity="0.4">
    <rect x="0" y="0" width="120" height="60" rx="2"/>
    <rect x="125" y="0" width="100" height="60" rx="2"/>
    <rect x="230" y="0" width="130" height="60" rx="2"/>
    <rect x="365" y="0" width="110" height="60" rx="2"/>
    <rect x="480" y="0" width="140" height="60" rx="2"/>
    <rect x="625" y="0" width="175" height="60" rx="2"/>
    <rect x="0" y="65" width="100" height="55" rx="2"/>
    <rect x="105" y="65" width="140" height="55" rx="2"/>
    <rect x="250" y="65" width="120" height="55" rx="2"/>
    <rect x="375" y="65" width="130" height="55" rx="2"/>
    <rect x="510" y="65" width="110" height="55" rx="2"/>
    <rect x="625" y="65" width="175" height="55" rx="2"/>
  </g>
  <!-- Ceiling beams -->
  <rect x="0" y="0" width="800" height="15" fill="#1a1208"/>
  <rect x="195" y="0" width="12" height="140" fill="#1a1208"/>
  <rect x="395" y="0" width="12" height="140" fill="#1a1208"/>
  <rect x="595" y="0" width="12" height="140" fill="#1a1208"/>
  <!-- Window (left) -->
  <rect x="80" y="60" width="80" height="100" fill="#0d1520" rx="4"/>
  <rect x="85" y="65" width="70" height="90" fill="#15202a" rx="2"/>
  <line x1="120" y1="65" x2="120" y2="155" stroke="#2a1f15" stroke-width="3"/>
  <line x1="85" y1="110" x2="155" y2="110" stroke="#2a1f15" stroke-width="3"/>
  <!-- Moonlight through window -->
  <polygon points="80,60 160,60 200,300 40,300" fill="#304050" opacity="0.08"/>
  <!-- Fireplace (right) -->
  <rect x="580" y="120" width="180" height="200" fill="#1a1208" rx="5"/>
  <rect x="590" y="130" width="160" height="180" fill="#0d0805" rx="3"/>
  <!-- Arch -->
  <path d="M590,130 Q670,80 750,130" fill="none" stroke="#2a1f10" stroke-width="8"/>
  <!-- Fire -->
  <g filter="url(#ti-glow)">
    <ellipse cx="670" cy="280" rx="40" ry="20" fill="#8a3a0a" opacity="0.4"/>
    <path d="M645,280 Q655,240 665,260 Q670,230 680,255 Q690,235 695,280" fill="#aa5010" opacity="0.6"/>
    <path d="M650,280 Q660,250 670,265 Q675,245 685,280" fill="#cc6020" opacity="0.5"/>
    <path d="M660,280 Q668,260 675,270 Q680,258 685,280" fill="#dd8030" opacity="0.6"/>
  </g>
  <!-- Fire glow on wall -->
  <rect width="800" height="500" fill="url(#ti-fire)"/>
  <!-- Bar counter (left-center) -->
  <rect x="30" y="300" width="350" height="30" fill="#2a1f10" rx="3"/>
  <rect x="30" y="330" width="350" height="120" fill="#1f1508"/>
  <!-- Bar details -->
  <rect x="40" y="305" width="330" height="5" fill="#352a18" rx="1"/>
  <!-- Bottles on shelf -->
  <g>
    <rect x="50" y="160" width="200" height="8" fill="#2a1f10"/>
    <rect x="60" y="130" width="15" height="30" fill="#1a2020" rx="2"/>
    <rect x="82" y="125" width="12" height="35" fill="#2a1515" rx="2"/>
    <rect x="100" y="128" width="14" height="32" fill="#151a2a" rx="2"/>
    <rect x="120" y="132" width="12" height="28" fill="#2a2015" rx="2"/>
    <rect x="140" y="126" width="16" height="34" fill="#1a1520" rx="2"/>
    <rect x="165" y="130" width="13" height="30" fill="#201a10" rx="2"/>
    <rect x="185" y="127" width="14" height="33" fill="#152020" rx="2"/>
    <rect x="210" y="132" width="12" height="28" fill="#2a1a15" rx="2"/>
  </g>
  <!-- Mugs on bar -->
  <g fill="#352a18">
    <rect x="80" y="285" width="16" height="18" rx="2"/>
    <rect x="120" y="285" width="16" height="18" rx="2"/>
    <rect x="200" y="285" width="16" height="18" rx="2"/>
    <rect x="300" y="285" width="16" height="18" rx="2"/>
  </g>
  <!-- Lantern glow (center) -->
  <g filter="url(#ti-glow)">
    <circle cx="400" cy="80" r="5" fill="#aa8020" opacity="0.7"/>
  </g>
  <rect width="800" height="500" fill="url(#ti-lantern)"/>
  <!-- Lantern -->
  <rect x="395" y="60" width="10" height="25" fill="#3a2a10" rx="2"/>
  <rect x="393" y="58" width="14" height="5" fill="#3a2a10"/>
  <circle cx="400" cy="72" r="4" fill="#cc9030" opacity="0.6"/>
  <!-- Tables (foreground) -->
  <rect x="420" y="360" width="100" height="10" fill="#2a1f10" rx="2"/>
  <rect x="430" y="370" width="8" height="80" fill="#2a1f10"/>
  <rect x="502" y="370" width="8" height="80" fill="#2a1f10"/>
  <rect x="620" y="370" width="100" height="10" fill="#2a1f10" rx="2"/>
  <rect x="630" y="380" width="8" height="70" fill="#2a1f10"/>
  <rect x="702" y="380" width="8" height="70" fill="#2a1f10"/>
  <!-- Floor -->
  <rect x="0" y="430" width="800" height="70" fill="url(#ti-floor)"/>
  <!-- Floor boards -->
  <g stroke="#2a2015" stroke-width="1" opacity="0.3">
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="470" x2="800" y2="470"/>
    <line x1="100" y1="430" x2="100" y2="500"/>
    <line x1="250" y1="430" x2="250" y2="500"/>
    <line x1="400" y1="430" x2="400" y2="500"/>
    <line x1="550" y1="430" x2="550" y2="500"/>
    <line x1="700" y1="430" x2="700" y2="500"/>
  </g>
</svg>