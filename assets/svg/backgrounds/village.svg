<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-asset-id="bg-village" data-layer="background" data-tags="village,town,houses,rural">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a8ab5"/>
      <stop offset="100%" stop-color="#a0d0f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="150" cy="50" rx="70" ry="25" fill="#fff" opacity="0.7"/>
  <ellipse cx="500" cy="70" rx="90" ry="30" fill="#fff" opacity="0.5"/>
  <!-- Hills -->
  <ellipse cx="400" cy="320" rx="500" ry="60" fill="#5a9a3a"/>
  <!-- Ground -->
  <rect x="0" y="320" width="800" height="180" fill="#4a8a2a"/>
  <!-- House 1 -->
  <rect x="100" y="250" width="100" height="80" fill="#c4a060"/>
  <polygon points="90,250 200,250 150,200" fill="#8b4513"/>
  <rect x="130" y="290" width="20" height="40" fill="#6b4020"/>
  <rect x="115" y="265" width="15" height="15" fill="#87ceeb"/>
  <!-- House 2 -->
  <rect x="450" y="260" width="120" height="70" fill="#b09050"/>
  <polygon points="440,260 570,260 505,210" fill="#7a3a10"/>
  <rect x="490" y="290" width="22" height="40" fill="#5a3010"/>
  <rect x="460" y="275" width="15" height="15" fill="#87ceeb"/>
  <rect x="535" y="275" width="15" height="15" fill="#87ceeb"/>
  <!-- Well -->
  <ellipse cx="330" cy="340" rx="20" ry="10" fill="#6a6a6a"/>
  <rect x="315" y="310" width="4" height="30" fill="#5a4a3a"/>
  <rect x="341" y="310" width="4" height="30" fill="#5a4a3a"/>
  <!-- Trees -->
  <rect x="650" y="260" width="10" height="60" fill="#5a3a10"/>
  <ellipse cx="655" cy="240" rx="30" ry="40" fill="#2a6a1a"/>
  <!-- Path -->
  <path d="M0,380 Q200,360 330,370 Q460,380 600,365 Q700,355 800,370" stroke="#c4a060" stroke-width="20" fill="none" opacity="0.4"/>
</svg>