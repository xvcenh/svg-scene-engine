<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' data-asset-id='forest-night' data-layer='background' data-tags='forest,night,nature,trees,moonlight,outdoor' data-origin='center-bottom'>
  <defs>
    <linearGradient id="fn-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="40%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#0f1a10"/>
    </linearGradient>
    <radialGradient id="fn-moon" cx="0.7" cy="0.15" r="0.3">
      <stop offset="0%" stop-color="#c0d0e0" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#8090a0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a2030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fn-fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030" stop-opacity="0"/>
      <stop offset="60%" stop-color="#152025" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0d1510" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="fn-glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="fn-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#fn-sky)"/>
  <!-- Stars -->
  <g fill="#8090a0" opacity="0.6">
    <circle cx="80" cy="40" r="1.2"/>
    <circle cx="150" cy="70" r="0.8"/>
    <circle cx="230" cy="30" r="1"/>
    <circle cx="310" cy="55" r="0.7"/>
    <circle cx="400" cy="25" r="1.1"/>
    <circle cx="480" cy="60" r="0.9"/>
    <circle cx="550" cy="35" r="1.3"/>
    <circle cx="620" cy="50" r="0.6"/>
    <circle cx="700" cy="28" r="1"/>
    <circle cx="760" cy="65" r="0.8"/>
    <circle cx="120" cy="100" r="0.5"/>
    <circle cx="350" cy="90" r="0.7"/>
    <circle cx="500" cy="95" r="0.6"/>
    <circle cx="670" cy="80" r="0.9"/>
  </g>
  <!-- Moon -->
  <circle cx="560" cy="75" r="30" fill="#c0d0e0" opacity="0.8"/>
  <circle cx="570" cy="70" r="28" fill="#0a0e14"/>
  <!-- Moon glow -->
  <rect width="800" height="500" fill="url(#fn-moon)"/>
  <!-- Distant trees -->
  <g opacity="0.3" filter="url(#fn-blur)">
    <polygon points="50,180 70,80 90,180" fill="#0a1208"/>
    <polygon points="120,190 145,70 170,190" fill="#0a1208"/>
    <polygon points="200,175 225,60 250,175" fill="#0a1208"/>
    <polygon points="300,185 330,65 360,185" fill="#0a1208"/>
    <polygon points="420,180 450,55 480,180" fill="#0a1208"/>
    <polygon points="540,175 565,70 590,175" fill="#0a1208"/>
    <polygon points="640,190 665,80 690,190" fill="#0a1208"/>
    <polygon points="720,180 745,75 770,180" fill="#0a1208"/>
  </g>
  <!-- Mid trees -->
  <g opacity="0.6">
    <rect x="75" y="220" width="10" height="120" fill="#15100a"/>
    <polygon points="30,240 80,80 130,240" fill="#0f1a08"/>
    <polygon points="40,200 80,100 120,200" fill="#15200d"/>
    <rect x="195" y="210" width="12" height="130" fill="#15100a"/>
    <polygon points="145,230 201,60 257,230" fill="#0f1a08"/>
    <polygon points="155,190 201,80 247,190" fill="#15200d"/>
    <rect x="595" y="215" width="11" height="125" fill="#15100a"/>
    <polygon points="545,235 600,65 655,235" fill="#0f1a08"/>
    <polygon points="555,195 600,85 645,195" fill="#15200d"/>
    <rect x="715" y="220" width="10" height="120" fill="#15100a"/>
    <polygon points="670,240 720,80 770,240" fill="#0f1a08"/>
    <polygon points="680,200 720,100 760,200" fill="#15200d"/>
  </g>
  <!-- Foreground trees -->
  <g>
    <rect x="15" y="230" width="18" height="180" fill="#0d0a05"/>
    <polygon points="-30,280 24,50 78,280" fill="#0a1005"/>
    <polygon points="-20,230 24,70 68,230" fill="#0f1a08"/>
    <polygon points="-10,190 24,90 58,190" fill="#15200d"/>
    <rect x="755" y="225" width="16" height="185" fill="#0d0a05"/>
    <polygon points="710,275 763,45 816,275" fill="#0a1005"/>
    <polygon points="720,225 763,65 806,225" fill="#0f1a08"/>
    <polygon points="730,185 763,85 796,185" fill="#15200d"/>
  </g>
  <!-- Ground -->
  <path d="M0,380 Q100,360 200,370 Q300,380 400,365 Q500,350 600,370 Q700,385 800,360 L800,500 L0,500 Z" fill="#0d1208"/>
  <path d="M0,400 Q150,385 300,395 Q450,405 600,390 Q700,380 800,395 L800,500 L0,500 Z" fill="#0a0e05"/>
  <!-- Moonlit path -->
  <path d="M350,500 Q360,450 370,400 Q380,370 390,350 Q400,340 410,350 Q420,370 430,400 Q440,450 450,500" fill="#1a1f10" stroke="#252a18" stroke-width="1"/>
  <!-- Moonlight shafts -->
  <g opacity="0.08">
    <polygon points="540,75 480,500 600,500" fill="#8090a0"/>
    <polygon points="560,75 500,500 620,500" fill="#8090a0"/>
  </g>
  <!-- Fireflies -->
  <g filter="url(#fn-glow)">
    <circle cx="300" cy="300" r="2" fill="#8aa040" opacity="0.6"/>
    <circle cx="450" cy="280" r="1.5" fill="#8aa040" opacity="0.4"/>
    <circle cx="380" cy="320" r="2" fill="#8aa040" opacity="0.5"/>
    <circle cx="520" cy="310" r="1.8" fill="#8aa040" opacity="0.3"/>
    <circle cx="250" cy="350" r="1.5" fill="#8aa040" opacity="0.5"/>
    <circle cx="600" cy="340" r="2" fill="#8aa040" opacity="0.4"/>
  </g>
  <!-- Fog -->
  <rect width="800" height="500" fill="url(#fn-fog)"/>
</svg>