<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-asset-id="bg-mountain" data-layer="background" data-tags="mountain,peak,highland">
  <rect width="800" height="500" fill="#6a8ab5"/>
  <!-- Mountains -->
  <polygon points="0,350 200,80 400,350" fill="#5a5a5a"/>
  <polygon points="150,350 400,50 650,350" fill="#4a4a4a"/>
  <polygon points="350,350 600,100 800,350" fill="#5a5a5a"/>
  <!-- Snow caps -->
  <polygon points="350,50 400,50 425,100 375,100" fill="#e8e8e8"/>
  <polygon points="180,80 200,80 220,120 170,120" fill="#ddd"/>
  <polygon points="580,100 600,100 620,140 570,140" fill="#ddd"/>
  <!-- Ground -->
  <rect x="0" y="350" width="800" height="150" fill="#4a7a2a"/>
  <!-- Pine trees -->
  <g opacity="0.6">
    <polygon points="80,350 95,290 110,350" fill="#2a5a1a"/>
    <polygon points="200,340 218,275 236,340" fill="#1e4a12"/>
    <polygon points="650,345 665,290 680,345" fill="#2a5a1a"/>
    <polygon points="730,350 748,285 766,350" fill="#1e4a12"/>
  </g>
  <!-- Eagle -->
  <path d="M500,120 L510,125 L520,120" stroke="#333" stroke-width="1.5" fill="none"/>
</svg>