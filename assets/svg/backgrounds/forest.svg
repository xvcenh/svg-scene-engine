<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-asset-id="bg-forest" data-layer="background" data-tags="forest,woods,tree,nature">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="60%" stop-color="#2d5a1e"/>
      <stop offset="100%" stop-color="#1e4d2b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Distant trees -->
  <g opacity="0.4">
    <ellipse cx="100" cy="200" rx="60" ry="120" fill="#1a3d15"/>
    <ellipse cx="250" cy="180" rx="70" ry="140" fill="#163a12"/>
    <ellipse cx="400" cy="190" rx="55" ry="130" fill="#1a3d15"/>
    <ellipse cx="550" cy="175" rx="65" ry="145" fill="#163a12"/>
    <ellipse cx="700" cy="195" rx="60" ry="125" fill="#1a3d15"/>
  </g>
  <!-- Mid trees -->
  <g opacity="0.7">
    <rect x="80" y="250" width="12" height="80" fill="#4a3520"/>
    <ellipse cx="86" cy="220" rx="40" ry="70" fill="#2a6b1a"/>
    <rect x="230" y="240" width="14" height="90" fill="#4a3520"/>
    <ellipse cx="237" cy="200" rx="50" ry="80" fill="#236015"/>
    <rect x="500" y="245" width="12" height="85" fill="#4a3520"/>
    <ellipse cx="506" cy="210" rx="45" ry="75" fill="#2a6b1a"/>
    <rect x="680" y="248" width="13" height="82" fill="#4a3520"/>
    <ellipse cx="686" cy="215" rx="42" ry="72" fill="#236015"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="320" width="800" height="180" fill="#2d5a1e"/>
  <ellipse cx="200" cy="340" rx="80" ry="8" fill="#3a6b24" opacity="0.5"/>
  <ellipse cx="600" cy="350" rx="90" ry="10" fill="#3a6b24" opacity="0.4"/>
  <!-- Foreground trees -->
  <rect x="-10" y="280" width="20" height="120" fill="#3a2510"/>
  <ellipse cx="0" cy="230" rx="60" ry="90" fill="#1e5631"/>
  <rect x="770" y="270" width="22" height="130" fill="#3a2510"/>
  <ellipse cx="781" cy="220" rx="65" ry="95" fill="#1e5631"/>
  <!-- Fireflies -->
  <circle cx="300" cy="280" r="2" fill="#ffffaa" opacity="0.8"/>
  <circle cx="450" cy="260" r="1.5" fill="#ffffaa" opacity="0.6"/>
  <circle cx="600" cy="290" r="2" fill="#ffffaa" opacity="0.7"/>
  <!-- Path -->
  <path d="M350,500 Q380,420 400,380 Q420,340 410,320" stroke="#6b5a3a" stroke-width="30" fill="none" opacity="0.3"/>
</svg>