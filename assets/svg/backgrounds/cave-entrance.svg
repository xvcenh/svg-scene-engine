<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' data-asset-id='cave-entrance' data-layer='background' data-tags='cave,entrance,rock,dark,dungeon,outdoor' data-origin='center-bottom'>
  <defs>
    <linearGradient id="ce-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="50%" stop-color="#252a20"/>
      <stop offset="100%" stop-color="#1a1a15"/>
    </linearGradient>
    <radialGradient id="ce-cave" cx="0.5" cy="0.45" r="0.3">
      <stop offset="0%" stop-color="#0a0805"/>
      <stop offset="60%" stop-color="#0d0a08"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </radialGradient>
    <linearGradient id="ce-rock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2520"/>
      <stop offset="50%" stop-color="#1f1a15"/>
      <stop offset="100%" stop-color="#252018"/>
    </linearGradient>
    <filter id="ce-blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="ce-glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#ce-sky)"/>
  <!-- Mountain/rock face background -->
  <path d="M0,100 Q50,80 100,120 Q200,60 300,100 Q400,50 500,90 Q600,40 700,80 Q750,60 800,100 L800,500 L0,500 Z" fill="#1f1a15"/>
  <!-- Rock face details -->
  <g fill="none" stroke="#2a2520" stroke-width="1" opacity="0.5">
    <path d="M50,120 Q80,140 60,180"/>
    <path d="M150,100 Q180,130 160,170"/>
    <path d="M250,110 Q270,140 260,180"/>
    <path d="M550,100 Q570,130 560,170"/>
    <path d="M650,90 Q680,120 660,160"/>
    <path d="M720,100 Q740,130 730,170"/>
  </g>
  <!-- Cave opening -->
  <path d="M250,500 Q250,380 280,280 Q310,200 350,160 Q400,120 450,160 Q490,200 520,280 Q550,380 550,500 Z" fill="url(#ce-cave)"/>
  <!-- Cave mouth shape (darker) -->
  <path d="M280,500 Q280,390 300,300 Q320,220 360,180 Q400,150 440,180 Q480,220 500,300 Q520,390 520,500 Z" fill="#050403"/>
  <!-- Cave interior hint -->
  <path d="M320,500 Q330,420 350,350 Q370,290 400,260 Q430,290 450,350 Q470,420 480,500 Z" fill="#080604" opacity="0.5"/>
  <!-- Rock formations (left) -->
  <path d="M0,200 Q50,180 80,220 Q120,260 150,300 Q180,350 160,400 Q140,450 120,500 L0,500 Z" fill="url(#ce-rock)"/>
  <path d="M100,250 Q130,230 160,270 Q190,310 200,360 Q210,400 220,500 L100,500 Z" fill="#252018"/>
  <!-- Rock formations (right) -->
  <path d="M800,180 Q750,160 720,200 Q690,240 660,280 Q640,330 650,380 Q660,430 680,500 L800,500 Z" fill="url(#ce-rock)"/>
  <path d="M700,230 Q670,210 650,250 Q630,290 620,340 Q610,390 600,500 L720,500 Z" fill="#252018"/>
  <!-- Stalactites at cave mouth -->
  <g fill="#2a2520">
    <polygon points="310,160 315,200 305,200"/>
    <polygon points="340,145 346,195 334,195"/>
    <polygon points="370,140 377,190 363,190"/>
    <polygon points="400,135 406,180 394,180"/>
    <polygon points="430,140 437,190 423,190"/>
    <polygon points="460,145 466,195 454,195"/>
    <polygon points="490,160 495,200 485,200"/>
  </g>
  <!-- Ground -->
  <path d="M0,420 Q100,400 200,410 Q300,420 400,405 Q500,390 600,410 Q700,425 800,400 L800,500 L0,500 Z" fill="#1a1510"/>
  <path d="M0,450 Q200,435 400,445 Q600,455 800,430 L800,500 L0,500 Z" fill="#15100a"/>
  <!-- Scattered rocks on ground -->
  <g fill="#2a2520">
    <ellipse cx="150" cy="430" rx="20" ry="10"/>
    <ellipse cx="200" cy="440" rx="15" ry="8"/>
    <ellipse cx="600" cy="435" rx="18" ry="9"/>
    <ellipse cx="670" cy="425" rx="14" ry="7"/>
    <ellipse cx="100" cy="450" rx="12" ry="6"/>
    <ellipse cx="720" cy="445" rx="16" ry="8"/>
  </g>
  <!-- Subtle glow from cave interior -->
  <g filter="url(#ce-glow)">
    <circle cx="400" cy="350" r="30" fill="#3a2a10" opacity="0.15"/>
  </g>
  <!-- Mist/fog at ground level -->
  <g opacity="0.15">
    <ellipse cx="400" cy="440" rx="200" ry="30" fill="#3a3530"/>
    <ellipse cx="200" cy="450" rx="120" ry="20" fill="#3a3530"/>
    <ellipse cx="600" cy="445" rx="130" ry="25" fill="#3a3530"/>
  </g>
</svg>