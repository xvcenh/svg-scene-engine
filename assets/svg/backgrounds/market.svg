<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' data-asset-id='market' data-layer='background' data-tags='market,stalls,village,shopping,outdoor' data-origin='center-bottom'>
  <defs>
    <linearGradient id="mk-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="60%" stop-color="#252520"/>
      <stop offset="100%" stop-color="#1f1a15"/>
    </linearGradient>
    <linearGradient id="mk-canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#2a1f12"/>
    </linearGradient>
    <linearGradient id="mk-canvas2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a2a"/>
      <stop offset="100%" stop-color="#1f1220"/>
    </linearGradient>
    <linearGradient id="mk-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2518"/>
      <stop offset="100%" stop-color="#1a150f"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#mk-sky)"/>
  <!-- Background buildings -->
  <rect x="0" y="120" width="120" height="380" fill="#1a1510"/>
  <polygon points="-10,120 60,70 130,120" fill="#151008"/>
  <rect x="10" y="140" width="22" height="28" fill="#152025" stroke="#2a2015" stroke-width="1.5"/>
  <rect x="45" y="140" width="22" height="28" fill="#152025" stroke="#2a2015" stroke-width="1.5"/>
  <rect x="80" y="140" width="22" height="28" fill="#152025" stroke="#2a2015" stroke-width="1.5"/>
  <rect x="680" y="130" width="120" height="370" fill="#1a1510"/>
  <polygon points="670,130 740,75 810,130" fill="#151008"/>
  <rect x="695" y="150" width="22" height="28" fill="#152025" stroke="#2a2015" stroke-width="1.5"/>
  <rect x="730" y="150" width="22" height="28" fill="#152025" stroke="#2a2015" stroke-width="1.5"/>
  <rect x="765" y="150" width="22" height="28" fill="#152025" stroke="#2a2015" stroke-width="1.5"/>
  <!-- Ground -->
  <rect x="0" y="350" width="800" height="150" fill="url(#mk-ground)"/>
  <!-- Stall 1 (left) - Produce -->
  <g>
    <!-- Stall frame -->
    <rect x="80" y="230" width="150" height="10" fill="#2a1f10"/>
    <rect x="85" y="240" width="8" height="110" fill="#2a1f10"/>
    <rect x="217" y="240" width="8" height="110" fill="#2a1f10"/>
    <!-- Canvas roof -->
    <path d="M70,225 Q110,210 155,225 Q200,210 240,225" fill="url(#mk-canvas)" stroke="#4a3a20" stroke-width="1"/>
    <polygon points="70,225 75,230 240,230 235,225" fill="#2a1f12"/>
    <!-- Produce display -->
    <rect x="95" y="260" width="120" height="25" fill="#2a2015" rx="2"/>
    <!-- Goods -->
    <circle cx="110" cy="270" r="6" fill="#3a2a10"/>
    <circle cx="130" cy="272" r="5" fill="#2a3518"/>
    <circle cx="148" cy="268" r="7" fill="#3a2510"/>
    <circle cx="168" cy="271" r="5" fill="#2a3015"/>
    <circle cx="185" cy="269" r="6" fill="#352a10"/>
    <!-- Basket -->
    <path d="M100,290 Q110,285 120,290 L118,310 Q110,315 102,310 Z" fill="#3a2a18"/>
    <path d="M140,288 Q150,283 160,288 L158,308 Q150,313 142,308 Z" fill="#3a2a18"/>
  </g>
  <!-- Stall 2 (center) - Blacksmith/Weapons -->
  <g>
    <rect x="310" y="220" width="180" height="12" fill="#2a1f10"/>
    <rect x="315" y="232" width="8" height="120" fill="#2a1f10"/>
    <rect x="477" y="232" width="8" height="120" fill="#2a1f10"/>
    <path d="M300,215 Q350,198 400,215 Q450,198 500,215" fill="url(#mk-canvas2)" stroke="#3a2030" stroke-width="1"/>
    <polygon points="300,215 306,220 494,220 500,215" fill="#1f1220"/>
    <!-- Weapons display -->
    <rect x="330" y="255" width="150" height="30" fill="#2a2015" rx="2"/>
    <!-- Swords -->
    <line x1="350" y1="250" x2="350" y2="290" stroke="#4a4a4a" stroke-width="2"/>
    <line x1="340" y1="260" x2="360" y2="260" stroke="#4a4a4a" stroke-width="2"/>
    <line x1="380" y1="248" x2="380" y2="288" stroke="#4a4a4a" stroke-width="2"/>
    <line x1="370" y1="258" x2="390" y2="258" stroke="#4a4a4a" stroke-width="2"/>
    <!-- Shield -->
    <path d="M420,250 Q440,245 460,250 L440,290 Z" fill="#2a2520" stroke="#3a3530" stroke-width="1"/>
    <!-- Helmet -->
    <path d="M470,260 Q480,248 490,260 L488,275 Q480,278 472,275 Z" fill="#3a3530"/>
  </g>
  <!-- Stall 3 (right) - Fabric/General -->
  <g>
    <rect x="560" y="235" width="140" height="10" fill="#2a1f10"/>
    <rect x="565" y="245" width="8" height="105" fill="#2a1f10"/>
    <rect x="687" y="245" width="8" height="105" fill="#2a1f10"/>
    <path d="M550,230 Q590,215 630,230 Q670,215 710,230" fill="url(#mk-canvas)" stroke="#4a3a20" stroke-width="1"/>
    <polygon points="550,230 556,235 704,235 710,230" fill="#2a1f12"/>
    <!-- Fabric rolls -->
    <rect x="580" y="260" width="110" height="25" fill="#2a2015" rx="2"/>
    <rect x="585" y="258" width="18" height="30" fill="#2a1a2a" rx="8"/>
    <rect x="610" y="258" width="18" height="30" fill="#2a2a1a" rx="8"/>
    <rect x="635" y="258" width="18" height="30" fill="#1a2a2a" rx="8"/>
    <rect x="660" y="258" width="18" height="30" fill="#2a1a1a" rx="8"/>
    <!-- Hanging cloth -->
    <path d="M575,245 Q580,280 585,245" fill="#3a2a2a" opacity="0.5"/>
    <path d="M640,245 Q645,285 650,245" fill="#2a3a2a" opacity="0.5"/>
    <path d="M690,245 Q695,275 700,245" fill="#2a2a3a" opacity="0.5"/>
  </g>
  <!-- Crates and barrels -->
  <g>
    <rect x="255" y="320" width="35" height="30" fill="#2a2015" rx="2"/>
    <rect x="260" y="318" width="25" height="3" fill="#3a2f18"/>
    <ellipse cx="530" cy="340" rx="18" ry="22" fill="#2a2015"/>
    <ellipse cx="530" cy="340" rx="16" ry="20" fill="none" stroke="#3a2f18" stroke-width="1.5"/>
    <rect x="245" y="335" width="30" height="25" fill="#2a2015" rx="2"/>
  </g>
  <!-- Lantern strings -->
  <path d="M90,220 Q200,200 310,215 Q400,205 500,218 Q580,208 700,225" fill="none" stroke="#2a2015" stroke-width="1"/>
  <g>
    <circle cx="150" cy="215" r="4" fill="#5a4a20" opacity="0.4"/>
    <circle cx="250" cy="208" r="4" fill="#5a4a20" opacity="0.4"/>
    <circle cx="350" cy="212" r="4" fill="#5a4a20" opacity="0.4"/>
    <circle cx="450" cy="215" r="4" fill="#5a4a20" opacity="0.4"/>
    <circle cx="550" cy="210" r="4" fill="#5a4a20" opacity="0.4"/>
    <circle cx="650" cy="218" r="4" fill="#5a4a20" opacity="0.4"/>
  </g>
  <!-- Market ground texture -->
  <g fill="none" stroke="#2a2518" stroke-width="0.5" opacity="0.3">
    <ellipse cx="100" cy="380" rx="20" ry="8"/>
    <ellipse cx="250" cy="390" rx="18" ry="7"/>
    <ellipse cx="400" cy="385" rx="22" ry="9"/>
    <ellipse cx="550" cy="388" rx="19" ry="8"/>
    <ellipse cx="700" cy="382" rx="21" ry="8"/>
  </g>
</svg>