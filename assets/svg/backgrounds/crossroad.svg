<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' data-asset-id='crossroad' data-layer='background' data-tags='crossroad,village,path,intersection,outdoor' data-origin='center-bottom'>
  <defs>
    <linearGradient id="cr-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="50%" stop-color="#2a2a20"/>
      <stop offset="100%" stop-color="#1a1a10"/>
    </linearGradient>
    <linearGradient id="cr-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2518"/>
      <stop offset="100%" stop-color="#1a150f"/>
    </linearGradient>
    <filter id="cr-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#cr-sky)"/>
  <!-- Distant hills -->
  <path d="M0,200 Q100,160 200,180 Q350,140 500,170 Q650,150 800,190 L800,300 L0,300 Z" fill="#1a1f15" opacity="0.6"/>
  <!-- Distant trees -->
  <g opacity="0.4" filter="url(#cr-blur)">
    <polygon points="30,185 50,120 70,185" fill="#1a2510"/>
    <polygon points="100,190 125,110 150,190" fill="#1a2510"/>
    <polygon points="180,180 205,100 230,180" fill="#1a2510"/>
    <polygon points="600,185 625,105 650,185" fill="#1a2510"/>
    <polygon points="680,190 705,115 730,190" fill="#1a2510"/>
    <polygon points="740,182 760,108 780,182" fill="#1a2510"/>
  </g>
  <!-- Ground plane -->
  <path d="M0,250 Q200,230 400,240 Q600,250 800,235 L800,500 L0,500 Z" fill="url(#cr-ground)"/>
  <!-- Crossroad paths -->
  <!-- Main road (left-right) -->
  <path d="M0,380 Q200,350 350,340 L450,340 Q600,350 800,380" fill="#2a2518" stroke="#352f1f" stroke-width="1"/>
  <!-- Road going forward (vanishing point) -->
  <path d="M350,340 L390,240 L410,240 L450,340" fill="#2a2518" stroke="#352f1f" stroke-width="1"/>
  <!-- Road going back -->
  <path d="M350,340 L300,500 L500,500 L450,340" fill="#252018" stroke="#302a1a" stroke-width="1"/>
  <!-- Signpost -->
  <rect x="396" y="260" width="8" height="100" fill="#352a18"/>
  <rect x="370" y="255" width="60" height="14" fill="#3a2f18" rx="2"/>
  <rect x="370" y="275" width="50" height="14" fill="#3a2f18" rx="2"/>
  <rect x="370" y="295" width="55" height="14" fill="#3a2f18" rx="2"/>
  <!-- Sign text lines -->
  <line x1="378" y1="262" x2="422" y2="262" stroke="#5a4f30" stroke-width="1"/>
  <line x1="378" y1="282" x2="412" y2="282" stroke="#5a4f30" stroke-width="1"/>
  <line x1="378" y1="302" x2="417" y2="302" stroke="#5a4f30" stroke-width="1"/>
  <!-- House left -->
  <g>
    <rect x="60" y="280" width="100" height="70" fill="#2a2015"/>
    <polygon points="50,280 110,230 170,280" fill="#1a1508"/>
    <rect x="85" y="310" width="25" height="40" fill="#1a1508"/>
    <rect x="125" y="295" width="20" height="20" fill="#15202a"/>
    <rect x="125" y="295" width="20" height="20" fill="none" stroke="#2a1f10" stroke-width="2"/>
  </g>
  <!-- House right -->
  <g>
    <rect x="620" y="275" width="110" height="75" fill="#2a2015"/>
    <polygon points="610,275 675,220 740,275" fill="#1a1508"/>
    <rect x="650" y="305" width="28" height="45" fill="#1a1508"/>
    <rect x="695" y="290" width="22" height="22" fill="#15202a"/>
    <rect x="695" y="290" width="22" height="22" fill="none" stroke="#2a1f10" stroke-width="2"/>
    <rect x="625" y="290" width="20" height="20" fill="#15202a"/>
    <rect x="625" y="290" width="20" height="20" fill="none" stroke="#2a1f10" stroke-width="2"/>
  </g>
  <!-- Fence posts -->
  <g fill="#2a2015">
    <rect x="180" y="310" width="5" height="30"/>
    <rect x="200" y="308" width="5" height="32"/>
    <rect x="220" y="306" width="5" height="34"/>
    <rect x="550" y="306" width="5" height="34"/>
    <rect x="570" y="308" width="5" height="32"/>
    <rect x="590" y="310" width="5" height="30"/>
  </g>
  <line x1="180" y1="318" x2="225" y2="314" stroke="#2a2015" stroke-width="3"/>
  <line x1="545" y1="314" x2="595" y2="318" stroke="#2a2015" stroke-width="3"/>
  <!-- Grass tufts -->
  <g fill="#2a3518" opacity="0.4">
    <path d="M250,360 L253,348 L256,360"/>
    <path d="M320,355 L323,343 L326,355"/>
    <path d="M500,358 L503,346 L506,358"/>
    <path d="M570,352 L573,340 L576,352"/>
  </g>
  <!-- Atmospheric haze -->
  <rect width="800" height="500" fill="#1a1f15" opacity="0.1"/>
</svg>