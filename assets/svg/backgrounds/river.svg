<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-asset-id="bg-river" data-layer="background" data-tags="river,water,stream,bridge">
  <rect width="800" height="500" fill="#5a8ab5"/>
  <!-- Far bank -->
  <rect x="0" y="200" width="800" height="60" fill="#3a6a2a"/>
  <!-- Water -->
  <rect x="0" y="260" width="800" height="120" fill="#2980b9"/>
  <g opacity="0.3">
    <path d="M0,290 Q200,280 400,295 Q600,310 800,285" stroke="#fff" stroke-width="2" fill="none"/>
    <path d="M0,320 Q200,330 400,315 Q600,300 800,325" stroke="#fff" stroke-width="1.5" fill="none"/>
    <path d="M0,350 Q200,340 400,355 Q600,370 800,345" stroke="#fff" stroke-width="1" fill="none"/>
  </g>
  <!-- Near bank -->
  <rect x="0" y="380" width="800" height="120" fill="#4a8a2a"/>
  <!-- Stone bridge -->
  <rect x="300" y="250" width="200" height="15" fill="#8a8a7a"/>
  <rect x="310" y="265" width="15" height="120" fill="#7a7a6a"/>
  <rect x="475" y="265" width="15" height="120" fill="#7a7a6a"/>
  <!-- Bridge arch -->
  <path d="M310,380 Q400,320 490,380" fill="none" stroke="#6a6a5a" stroke-width="8"/>
  <!-- Trees on far bank -->
  <rect x="100" y="160" width="8" height="50" fill="#4a3a10"/>
  <ellipse cx="104" cy="140" rx="25" ry="35" fill="#2a6a1a"/>
  <rect x="600" y="155" width="10" height="55" fill="#4a3a10"/>
  <ellipse cx="605" cy="130" rx="30" ry="40" fill="#1e5a12"/>
  <!-- Reeds -->
  <line x1="50" y1="380" x2="55" y2="350" stroke="#3a6a2a" stroke-width="2"/>
  <line x1="60" y1="380" x2="58" y2="345" stroke="#3a6a2a" stroke-width="2"/>
  <line x1="700" y1="380" x2="705" y2="350" stroke="#3a6a2a" stroke-width="2"/>
</svg>