<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" data-asset-id="bg-tavern" data-layer="background" data-tags="tavern,inn,bar,drink">
  <rect width="800" height="500" fill="#2a1a0e"/>
  <!-- Walls -->
  <rect x="0" y="0" width="800" height="400" fill="#3a2a1a"/>
  <!-- Wooden beams -->
  <rect x="0" y="60" width="800" height="8" fill="#5a3a1a"/>
  <rect x="0" y="200" width="800" height="6" fill="#4a2a10"/>
  <rect x="200" y="0" width="8" height="400" fill="#5a3a1a"/>
  <rect x="600" y="0" width="8" height="400" fill="#5a3a1a"/>
  <!-- Bar counter -->
  <rect x="100" y="280" width="400" height="20" rx="4" fill="#6b4020"/>
  <rect x="100" y="300" width="400" height="60" fill="#5a3518"/>
  <!-- Barrels -->
  <ellipse cx="150" cy="350" rx="25" ry="30" fill="#6b4a20" stroke="#5a3a10" stroke-width="2"/>
  <ellipse cx="150" cy="340" rx="22" ry="3" fill="#7a5a30"/>
  <ellipse cx="220" cy="350" rx="25" ry="30" fill="#5a3a18" stroke="#4a2a08" stroke-width="2"/>
  <!-- Bottles -->
  <rect x="320" y="250" width="8" height="30" rx="3" fill="#2a5a2a"/>
  <rect x="340" y="255" width="8" height="25" rx="3" fill="#5a2a2a"/>
  <rect x="360" y="248" width="8" height="32" rx="3" fill="#2a2a5a"/>
  <!-- Fireplace -->
  <rect x="620" y="250" width="120" height="150" fill="#4a3020"/>
  <rect x="640" y="320" width="80" height="40" fill="#2a1a0a"/>
  <ellipse cx="680" cy="330" rx="25" ry="15" fill="#ff6600" opacity="0.8"/>
  <ellipse cx="680" cy="325" rx="15" ry="10" fill="#ff9900" opacity="0.6"/>
  <!-- Tables -->
  <rect x="300" y="380" width="60" height="6" rx="2" fill="#6b4a20"/>
  <rect x="320" y="386" width="6" height="30" fill="#5a3a10"/>
  <rect x="334" y="386" width="6" height="30" fill="#5a3a10"/>
  <!-- Floor -->
  <rect x="0" y="400" width="800" height="100" fill="#3a2a18"/>
  <!-- Warm glow -->
  <ellipse cx="400" cy="250" rx="350" ry="200" fill="#ff8800" opacity="0.05"/>
</svg>