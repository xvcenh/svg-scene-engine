  <rect x="170" y="130" width="140" height="370" fill="#1f1a12"/>
  <rect x="185" y="150" width="25" height="30" fill="#152025" stroke="#2a2015" stroke-width="2"/>
  <rect x="220" y="150" width="25" height="30" fill="#152025" stroke="#2a2015" stroke-width="2"/>
  <rect x="255" y="150" width="25" height="30" fill="#152025" stroke="#2a2015" stroke-width="2"/>
  <rect x="185" y="200" width="25" height="30" fill="#152025" stroke="#2a2015" stroke-width="2"/>
  <rect x="255" y="200" width="25" height="30" fill="#152025" stroke="#2a2015" stroke-width="2"/>
  <rect x="220" y="350" width="40" height="55" fill="#1a150a"/>
  <polygon points="160,130 240,75 320,130" fill="#151008"/>
  <!-- Center-right building -->
  <rect x="490" y="140" width="150" height="360" fill="#1a1510"/>
  <rect x="505" y="160" width="28" height="32" fill="#152025" stroke="#2a2015" stroke-width="2"/>
  <rect x="545" y="160" width="28" height="32" fill="#152025" stroke="#2a2015" stroke-width="2"/>
  <rect x="585" y="160" width="28" height="32" fill="#152025" stroke="#2a2015" stroke-width="2"/>
  <rect x="505" y="215" width="28" height="32" fill="#152025" stroke="#2a2015" stroke-width="2"/>
  <rect x="585" y="215" width="28" height="32" fill="#152025" stroke="#2a2015" stroke-width="2"/>
