<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' data-asset-id='town-square' data-layer='background' data-tags='town,square,fountain,village,market,outdoor' data-origin='center-bottom'>
  <defs>
    <linearGradient id="ts-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="60%" stop-color="#2a2a25"/>
      <stop offset="100%" stop-color="#1f1f18"/>
    </linearGradient>
    <linearGradient id="ts-stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#1a1815"/>
    </linearGradient>
    <radialGradient id="ts-water" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#2a3540" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a2025" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#ts-sky)"/>
  <!-- Buildings background -->
  <!-- Left building -->
  <rect x="0" y="150" width="160" height="350" fill="#1a1510"/>
  <rect x="10" y="170" width="30" height="35" fill="#152025" stroke="#2a2015" stroke-width="2"/>
