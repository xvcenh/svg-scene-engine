  <rect x="315" y="378" width="5" height="12" fill="#2a2015"/>
  <rect x="340" y="378" width="5" height="12" fill="#2a2015"/>
  <rect x="450" y="370" width="40" height="8" fill="#2a2015" rx="1"/>
  <rect x="455" y="378" width="5" height="12" fill="#2a2015"/>
