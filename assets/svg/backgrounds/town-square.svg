    <ellipse cx="400" cy="425" rx="25" ry="12"/>
    <ellipse cx="500" cy="428" rx="25" ry="12"/>
    <ellipse cx="570" cy="422" rx="25" ry="12"/>
    <ellipse cx="640" cy="430" rx="25" ry="12"/>
    <ellipse cx="710" cy="425" rx="25" ry="12"/>
  </g>
