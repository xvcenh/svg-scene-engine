    <ellipse cx="670" cy="398" rx="25" ry="12"/>
    <ellipse cx="740" cy="400" rx="25" ry="12"/>
    <ellipse cx="85" cy="425" rx="25" ry="12"/>
    <ellipse cx="155" cy="428" rx="25" ry="12"/>
    <ellipse cx="225" cy="422" rx="25" ry="12"/>
