  <g stroke="#3a4550" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M385,277 Q380,300 370,340"/>
    <path d="M400,277 Q400,300 400,340"/>
    <path d="M415,277 Q420,300 430,340"/>
