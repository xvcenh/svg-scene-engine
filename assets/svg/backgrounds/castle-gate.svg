<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500' data-asset-id='castle-gate' data-layer='background' data-tags='castle,gate,fortress,medieval,stone,outdoor' data-origin='center-bottom'>
  <defs>
    <linearGradient id="cg-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151a25"/>
      <stop offset="50%" stop-color="#20252a"/>
      <stop offset="100%" stop-color="#1a1a18"/>
    </linearGradient>
    <linearGradient id="cg-stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#1a1815"/>
    </linearGradient>
    <linearGradient id="cg-stone2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252018"/>
      <stop offset="100%" stop-color="#1f1a12"/>
    </linearGradient>
    <radialGradient id="cg-torch" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8a5a10" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2a1a08" stop-opacity="0"/>
    </radialGradient>
    <filter id="cg-glow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#cg-sky)"/>
  <!-- Castle wall (left) -->
  <rect x="0" y="100" width="250" height="400" fill="url(#cg-stone)"/>
  <!-- Left tower -->
  <rect x="0" y="50" width="100" height="450" fill="url(#cg-stone2)"/>
  <!-- Battlements left tower -->
  <g fill="#2a2520">
    <rect x="0" y="40" width="18" height="20"/>
    <rect x="27" y="40" width="18" height="20"/>
    <rect x="54" y="40" width="18" height="20"/>
    <rect x="82" y="40" width="18" height="20"/>
  </g>
  <!-- Battlements left wall -->
  <g fill="#2a2520">
    <rect x="105" y="90" width="18" height="18"/>
    <rect x="132" y="90" width="18" height="18"/>
    <rect x="159" y="90" width="18" height="18"/>
    <rect x="186" y="90" width="18" height="18"/>
    <rect x="213" y="90" width="18" height="18"/>
  </g>
  <!-- Castle wall (right) -->
  <rect x="550" y="100" width="250" height="400" fill="url(#cg-stone)"/>
  <!-- Right tower -->
  <rect x="700" y="50" width="100" height="450" fill="url(#cg-stone2)"/>
  <!-- Battlements right tower -->
  <g fill="#2a2520">
    <rect x="700" y="40" width="18" height="20"/>
    <rect x="727" y="40" width="18" height="20"/>
    <rect x="754" y="40" width="18" height="20"/>
    <rect x="782" y="40" width="18" height="20"/>
  </g>
  <!-- Battlements right wall -->
  <g fill="#2a2520">
    <rect x="555" y="90" width="18" height="18"/>
    <rect x="582" y="90" width="18" height="18"/>
    <rect x="609" y="90" width="18" height="18"/>
    <rect x="636" y="90" width="18" height="18"/>
    <rect x="663" y="90" width="18" height="18"/>
  </g>
  <!-- Stone texture on walls -->
  <g fill="none" stroke="#352f25" stroke-width="0.8" opacity="0.4">
    <!-- Left wall -->
    <rect x="5" y="110" width="40" height="25" rx="1"/>
    <rect x="50" y="110" width="35" height="25" rx="1"/>
    <rect x="105" y="115" width="45" height="22" rx="1"/>
    <rect x="155" y="112" width="38" height="24" rx="1"/>
    <rect x="200" y="110" width="40" height="25" rx="1"/>
    <rect x="5" y="140" width="35" height="24" rx="1"/>
    <rect x="45" y="138" width="42" height="26" rx="1"/>
    <rect x="105" y="142" width="38" height="22" rx="1"/>
    <rect x="150" y="140" width="45" height="25" rx="1"/>
    <rect x="200" y="138" width="40" height="24" rx="1"/>
    <!-- Right wall -->
    <rect x="555" y="110" width="40" height="25" rx="1"/>
    <rect x="600" y="110" width="35" height="25" rx="1"/>
    <rect x="650" y="115" width="45" height="22" rx="1"/>
    <rect x="555" y="140" width="35" height="24" rx="1"/>
    <rect x="595" y="138" width="42" height="26" rx="1"/>
    <rect x="650" y="140" width="40" height="25" rx="1"/>
  </g>
  <!-- Gate arch -->
  <path d="M250,500 L250,200 Q250,140 400,140 Q550,140 550,200 L550,500" fill="#0d0a08"/>
  <!-- Gate arch stone frame -->
  <path d="M255,500 L255,205 Q255,148 400,148 Q545,148 545,205 L545,500" fill="none" stroke="#2a2520" stroke-width="8"/>
  <!-- Gate arch keystone -->
  <polygon points="390,145 400,130 410,145" fill="#2a2520"/>
  <!-- Portcullis -->
  <g stroke="#3a3530" stroke-width="3" opacity="0.6">
    <line x1="300" y1="200" x2="300" y2="500"/>
    <line x1="350" y1="180" x2="350" y2="500"/>
    <line x1="400" y1="170" x2="400" y2="500"/>
    <line x1="450" y1="180" x2="450" y2="500"/>
    <line x1="500" y1="200" x2="500" y2="500"/>
  </g>
  <g stroke="#3a3530" stroke-width="2.5" opacity="0.5">
    <line x1="260" y1="250" x2="540" y2="250"/>
    <line x1="260" y1="300" x2="540" y2="300"/>
    <line x1="260" y1="350" x2="540" y2="350"/>
    <line x1="260" y1="400" x2="540" y2="400"/>
    <line x1="260" y1="450" x2="540" y2="450"/>
  </g>
  <!-- Torch left -->
  <g>
    <rect x="230" y="250" width="6" height="25" fill="#3a2a18"/>
    <g filter="url(#cg-glow)">
      <circle cx="233" cy="245" r="8" fill="#aa6a10" opacity="0.5"/>
    </g>
    <path d="M228,250 Q233,235 238,250" fill="#cc7a20" opacity="0.6"/>
    <path d="M230,248 Q233,240 236,248" fill="#dd9030" opacity="0.5"/>
  </g>
  <!-- Torch right -->
  <g>
    <rect x="564" y="250" width="6" height="25" fill="#3a2a18"/>
    <g filter="url(#cg-glow)">
      <circle cx="567" cy="245" r="8" fill="#aa6a10" opacity="0.5"/>
    </g>
    <path d="M562,250 Q567,235 572,250" fill="#cc7a20" opacity="0.6"/>
    <path d="M564,248 Q567,240 570,248" fill="#dd9030" opacity="0.5"/>
  </g>
  <!-- Guard slit windows left tower -->
  <rect x="35" y="130" width="4" height="20" fill="#0d0a08" rx="2"/>
  <rect x="60" y="130" width="4" height="20" fill="#0d0a08" rx="2"/>
  <rect x="35" y="200" width="4" height="20" fill="#0d0a08" rx="2"/>
  <rect x="60" y="200" width="4" height="20" fill="#0d0a08" rx="2"/>
  <!-- Guard slit windows right tower -->
  <rect x="736" y="130" width="4" height="20" fill="#0d0a08" rx="2"/>
  <rect x="761" y="130" width="4" height="20" fill="#0d0a08" rx="2"/>
  <rect x="736" y="200" width="4" height="20" fill="#0d0a08" rx="2"/>
  <rect x="761" y="200" width="4" height="20" fill="#0d0a08" rx="2"/>
  <!-- Flag poles -->
  <rect x="45" y="10" width="3" height="40" fill="#3a3530"/>
  <path d="M48,12 L70,18 L48,24" fill="#2a1520" opacity="0.7"/>
  <rect x="752" y="10" width="3" height="40" fill="#3a3530"/>
  <path d="M755,12 L777,18 L755,24" fill="#2a1520" opacity="0.7"/>
  <!-- Ground -->
  <path d="M0,430 Q200,420 400,425 Q600,430 800,415 L800,500 L0,500 Z" fill="#1a1510"/>
  <path d="M0,460 Q200,450 400,455 Q600,460 800,445 L800,500 L0,500 Z" fill="#15100a"/>
  <!-- Stone path through gate -->
  <path d="M320,500 Q340,470 360,450 Q380,440 400,438 Q420,440 440,450 Q460,470 480,500" fill="#2a2518"/>
</svg>