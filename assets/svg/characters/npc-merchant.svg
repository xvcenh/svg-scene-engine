<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180"
  data-asset-id="npc-merchant"
  data-layer="character"
  data-tags="merchant,trader,npc,shopkeeper,goods,idle"
  data-origin="center-bottom">
  <!-- Dark Fantasy Merchant -->
  <defs>
    <linearGradient id="vest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4a1a"/>
      <stop offset="100%" stop-color="#4a2a0a"/>
    </linearGradient>
  </defs>
  <!-- Legs -->
  <rect x="44" y="120" width="14" height="38" rx="3" fill="#3a2a1a"/>
  <rect x="62" y="120" width="14" height="38" rx="3" fill="#3a2a1a"/>
  <!-- Shoes -->
  <ellipse cx="51" cy="158" rx="10" ry="4" fill="#2a1a0a"/>
  <ellipse cx="69" cy="158" rx="10" ry="4" fill="#2a1a0a"/>
  <!-- Apron / skirt -->
  <path d="M40 100 L36 158 L84 158 L80 100 Q70 96 60 96 Q50 96 40 100Z" fill="#5a4a2a" stroke="#4a3a1a" stroke-width="0.5"/>
  <!-- Torso / shirt -->
  <path d="M40 55 L40 102 Q50 106 60 104 Q70 106 80 102 L80 55 Q70 48 60 46 Q50 48 40 55Z" fill="#c9a070" stroke="#b8905f" stroke-width="0.5"/>
  <!-- Vest -->
  <path d="M42 58 L42 100 Q52 104 60 102 Q68 104 78 100 L78 58 Q68 52 60 50 Q52 52 42 58Z" fill="url(#vest)" stroke="#5a3a0a" stroke-width="0.5"/>
  <!-- Vest buttons -->
  <circle cx="60" cy="65" r="2" fill="#c9a84c"/>
  <circle cx="60" cy="75" r="2" fill="#c9a84c"/>
  <circle cx="60" cy="85" r="2" fill="#c9a84c"/>
  <!-- Arms -->
  <path d="M40 58 L28 92 Q26 96 30 98 L38 96 Q40 94 40 90 L42 62Z" fill="#c9a070"/>
  <path d="M80 58 L92 92 Q94 96 90 98 L82 96 Q80 94 80 90 L78 62Z" fill="#c9a070"/>
  <!-- Hands -->
  <ellipse cx="30" cy="96" rx="5" ry="4" fill="#c9a070"/>
  <ellipse cx="90" cy="96" rx="5" ry="4" fill="#c9a070"/>
  <!-- Goods sack (left hand) -->
  <path d="M22 80 Q16 96 18 110 Q20 116 28 114 L32 96 Q30 88 22 80Z" fill="#7a6a4a" stroke="#5a4a2a" stroke-width="0.5"/>
  <path d="M18 80 Q24 76 30 80" fill="none" stroke="#5a4a2a" stroke-width="1"/>
  <!-- Coin purse (right hand) -->
  <ellipse cx="94" cy="94" rx="6" ry="8" fill="#8a6a2a" stroke="#6a4a1a" stroke-width="0.5"/>
  <line x1="88" y1="90" x2="100" y2="90" stroke="#5a3a0a" stroke-width="1"/>
  <!-- Neck -->
  <rect x="52" y="42" width="16" height="10" rx="2" fill="#c9a070"/>
  <!-- Head -->
  <ellipse cx="60" cy="30" rx="14" ry="16" fill="#c9a070"/>
  <!-- Hat (merchant cap) -->
  <path d="M44 28 Q44 10 60 8 Q76 10 76 28 L72 30 Q72 16 60 14 Q48 16 48 30Z" fill="#5a3a0a"/>
  <ellipse cx="60" cy="30" rx="18" ry="4" fill="#6a4a1a"/>
  <!-- Face -->
  <!-- Eyes -->
  <ellipse cx="54" cy="28" rx="2" ry="2.5" fill="#fff"/>
  <circle cx="54" cy="28" r="1.2" fill="#2a1a0a"/>
  <ellipse cx="66" cy="28" rx="2" ry="2.5" fill="#fff"/>
  <circle cx="66" cy="28" r="1.2" fill="#2a1a0a"/>
  <!-- Nose -->
  <ellipse cx="60" cy="33" rx="3" ry="2" fill="#b89060"/>
  <!-- Smile -->
  <path d="M54 38 Q60 42 66 38" fill="none" stroke="#4a2a0a" stroke-width="1" stroke-linecap="round"/>
  <!-- Mustache -->
  <path d="M54 36 Q58 34 60 36 Q62 34 66 36" fill="#4a3a2a" opacity="0.8"/>
</svg>