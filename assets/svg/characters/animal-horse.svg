<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120"
  data-asset-id="animal-horse"
  data-layer="character"
  data-tags="animal,horse,steed,mount,livestock,idle"
  data-origin="center-bottom">
  <!-- Dark Fantasy Horse -->
  <defs>
    <linearGradient id="horse-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="70" cy="50" rx="35" ry="22" fill="url(#horse-body)"/>
  <!-- Chest -->
  <ellipse cx="95" cy="48" rx="12" ry="18" fill="#3a2a1a"/>
  <!-- Hindquarters -->
  <ellipse cx="40" cy="48" rx="14" ry="18" fill="#3a2a1a"/>
  <!-- Neck -->
  <path d="M92 42 Q100 20 108 12 Q112 8 110 14 L100 38 Q96 44 92 44Z" fill="#3a2a1a"/>
  <!-- Head -->
  <path d="M106 14 Q108 6 116 4 Q124 4 126 10 Q128 16 122 20 Q116 22 108 18Z" fill="#3a2a1a"/>
  <!-- Muzzle -->
  <ellipse cx="124" cy="14" rx="6" ry="5" fill="#4a3a2a"/>
  <!-- Nostril -->
  <circle cx="126" cy="13" r="1.5" fill="#1a0a0a"/>
  <!-- Eye -->
  <ellipse cx="114" cy="10" rx="2.5" ry="2.5" fill="#fff"/>
  <circle cx="114.5" cy="10" r="1.5" fill="#1a1a1a"/>
  <!-- Ear -->
  <path d="M108 6 Q106 0 110 0 Q114 0 112 6Z" fill="#3a2a1a" stroke="#2a1a0a" stroke-width="0.5"/>
  <!-- Mane -->
  <path d="M106 8 Q102 14 98 22 Q96 28 94 34 Q92 38 90 42" fill="none" stroke="#1a0a0a" stroke-width="4" stroke-linecap="round"/>
  <path d="M108 6 Q104 12 100 20 Q98 26 96 32 Q94 36 92 40" fill="none" stroke="#2a1a0a" stroke-width="3" stroke-linecap="round"/>
  <!-- Front legs -->
  <rect x="90" y="62" width="7" height="36" rx="2" fill="#3a2a1a"/>
  <rect x="100" y="62" width="7" height="36" rx="2" fill="#3a2a1a"/>
  <!-- Hind legs -->
  <rect x="35" y="62" width="7" height="36" rx="2" fill="#3a2a1a"/>
  <rect x="46" y="62" width="7" height="36" rx="2" fill="#3a2a1a"/>
  <!-- Hooves -->
  <rect x="89" y="94" width="9" height="6" rx="1" fill="#1a1a1a"/>
  <rect x="99" y="94" width="9" height="6" rx="1" fill="#1a1a1a"/>
  <rect x="34" y="94" width="9" height="6" rx="1" fill="#1a1a1a"/>
  <rect x="45" y="94" width="9" height="6" rx="1" fill="#1a1a1a"/>
  <!-- Tail -->
  <path d="M32 42 Q24 48 20 58 Q18 64 22 68" fill="none" stroke="#1a0a0a" stroke-width="4" stroke-linecap="round"/>
  <path d="M33 44 Q26 50 23 58 Q21 62 24 66" fill="none" stroke="#2a1a0a" stroke-width="3" stroke-linecap="round"/>
  <!-- Saddle (optional dark fantasy tack) -->
  <path d="M62 38 Q70 32 78 38 L80 44 Q70 48 60 44Z" fill="#4a2a0a" stroke="#3a1a0a" stroke-width="0.5"/>
  <rect x="66" y="36" width="8" height="4" rx="1" fill="#8a6a2a"/>
  <!-- Saddle strap -->
  <path d="M60 44 L60 56 Q62 62 64 56 L64 44" fill="none" stroke="#3a1a0a" stroke-width="1.5"/>
  <path d="M76 44 L76 56 Q78 62 80 56 L80 44" fill="none" stroke="#3a1a0a" stroke-width="1.5"/>
</svg>