<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180"
  data-asset-id="npc-guard"
  data-layer="character"
  data-tags="guard,soldier,spear,npc,watchman,idle"
  data-origin="center-bottom">
  <!-- Dark Fantasy Guard with Spear -->
  <defs>
    <linearGradient id="guard-armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="100%" stop-color="#2a2a3a"/>
    </linearGradient>
  </defs>
  <!-- Legs -->
  <rect x="44" y="120" width="14" height="38" rx="3" fill="#2a2a3a"/>
  <rect x="62" y="120" width="14" height="38" rx="3" fill="#2a2a3a"/>
  <!-- Boots -->
  <rect x="42" y="152" width="18" height="10" rx="2" fill="#1a1a1a"/>
  <rect x="60" y="152" width="18" height="10" rx="2" fill="#1a1a1a"/>
  <!-- Chainmail tunic -->
  <path d="M38 65 L38 124 Q38 128 60 128 Q82 128 82 124 L82 65 Q72 58 60 56 Q48 58 38 65Z" fill="url(#guard-armor)" stroke="#555" stroke-width="0.5"/>
  <!-- Chainmail pattern hint -->
  <pattern id="chain" width="4" height="4" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#5a5a6a" opacity="0.3"/>
  </pattern>
  <path d="M42 68 L42 120 Q50 124 60 122 Q70 124 78 120 L78 68 Q70 62 60 60 Q50 62 42 68Z" fill="url(#chain)"/>
  <!-- Leather belt -->
  <rect x="38" y="105" width="44" height="6" rx="1" fill="#3a2a1a"/>
  <rect x="56" y="103" width="8" height="10" rx="1" fill="#8a7a5a" stroke="#6a5a3a" stroke-width="0.5"/>
  <!-- Shoulder guards -->
  <rect x="28" y="60" width="18" height="10" rx="3" fill="#3a3a4a" stroke="#4a4a5a" stroke-width="0.5"/>
  <rect x="74" y="60" width="18" height="10" rx="3" fill="#3a3a4a" stroke="#4a4a5a" stroke-width="0.5"/>
  <!-- Arms -->
  <rect x="26" y="68" width="12" height="36" rx="4" fill="url(#guard-armor)"/>
  <rect x="82" y="68" width="12" height="36" rx="4" fill="url(#guard-armor)"/>
  <!-- Hands -->
  <ellipse cx="32" cy="104" rx="5" ry="4" fill="#c9a070"/>
  <ellipse cx="88" cy="104" rx="5" ry="4" fill="#c9a070"/>
  <!-- Spear (held in right hand) -->
  <line x1="88" y1="102" x2="104" y2="4" stroke="#6a5a3a" stroke-width="3" stroke-linecap="round"/>
  <line x1="88" y1="102" x2="104" y2="4" stroke="#8a7a4a" stroke-width="2" stroke-linecap="round"/>
  <!-- Spearhead -->
  <polygon points="104,4 100,18 108,18" fill="#8a8a9a" stroke="#aaa" stroke-width="0.5"/>
  <!-- Spear butt -->
  <circle cx="88" cy="102" r="3" fill="#5a4a2a"/>
  <!-- Neck -->
  <rect x="52" y="46" width="16" height="12" rx="2" fill="#c9a070"/>
  <!-- Helmet (guard style) -->
  <path d="M42 48 Q42 20 60 16 Q78 20 78 48 L74 50 Q74 28 60 24 Q46 28 46 50Z" fill="#3a3a4a" stroke="#4a4a5a" stroke-width="0.5"/>
  <!-- Helmet nose guard -->
  <rect x="57" y="32" width="6" height="16" rx="1" fill="#3a3a4a"/>
  <!-- Face opening -->
  <rect x="46" y="34" width="28" height="14" rx="2" fill="#c9a070"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="40" rx="2" ry="2" fill="#fff"/>
  <circle cx="52" cy="40" r="1" fill="#2a1a0a"/>
  <ellipse cx="68" cy="40" rx="2" ry="2" fill="#fff"/>
  <circle cx="68" cy="40" r="1" fill="#2a1a0a"/>
  <!-- Helmet crest -->
  <path d="M56 16 Q60 6 64 16" fill="#4a4a5a" stroke="#3a3a4a" stroke-width="0.5"/>
</svg>