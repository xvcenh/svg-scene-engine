<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" data-asset-id="char-warrior" data-layer="character" data-tags="warrior,fighter,soldier,knight">
  <!-- Body -->
  <rect x="40" y="60" width="40" height="50" rx="5" fill="#5a5a6a"/>
  <!-- Armor detail -->
  <rect x="42" y="62" width="36" height="8" rx="2" fill="#7a7a8a"/>
  <!-- Legs -->
  <rect x="44" y="110" width="14" height="35" rx="3" fill="#4a4a5a"/>
  <rect x="62" y="110" width="14" height="35" rx="3" fill="#4a4a5a"/>
  <!-- Boots -->
  <rect x="42" y="140" width="18" height="10" rx="3" fill="#3a2a1a"/>
  <rect x="60" y="140" width="18" height="10" rx="3" fill="#3a2a1a"/>
  <!-- Arms -->
  <rect x="28" y="65" width="12" height="40" rx="4" fill="#5a5a6a"/>
  <rect x="80" y="65" width="12" height="40" rx="4" fill="#5a5a6a"/>
  <!-- Sword -->
  <rect x="88" y="40" width="4" height="55" rx="1" fill="#b0b0c0"/>
  <rect x="83" y="60" width="14" height="4" rx="1" fill="#8b6914"/>
  <rect x="86" y="64" width="8" height="10" rx="1" fill="#6b4a20"/>
  <!-- Shield -->
  <ellipse cx="30" cy="85" rx="14" ry="18" fill="#8b6914" stroke="#6b4914" stroke-width="2"/>
  <line x1="30" y1="70" x2="30" y2="100" stroke="#6b4914" stroke-width="2"/>
  <!-- Helmet -->
  <ellipse cx="60" cy="38" rx="22" ry="24" fill="#7a7a8a"/>
  <rect x="42" y="30" width="36" height="8" rx="2" fill="#8a8a9a"/>
  <rect x="45" y="38" width="30" height="4" rx="1" fill="#2a2a3a"/>
  <!-- Plume -->
  <ellipse cx="60" cy="18" rx="6" ry="14" fill="#cc3333"/>
  <!-- Face visible through visor -->
  <rect x="50" y="42" width="8" height="3" rx="1" fill="#d4a843" opacity="0.6"/>
  <rect x="62" y="42" width="8" height="3" rx="1" fill="#d4a843" opacity="0.6"/>
</svg>