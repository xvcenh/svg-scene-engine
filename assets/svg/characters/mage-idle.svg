<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180"
  data-asset-id="mage-idle"
  data-layer="character"
  data-tags="mage,wizard,robed,npc,caster,magic,idle"
  data-origin="center-bottom">
  <!-- Dark Fantasy Mage with Staff -->
  <defs>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a4a"/>
      <stop offset="100%" stop-color="#1a0a2a"/>
    </linearGradient>
    <radialGradient id="orb-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#aa66ff"/>
      <stop offset="60%" stop-color="#6633aa"/>
      <stop offset="100%" stop-color="#331166"/>
    </radialGradient>
  </defs>
  <!-- Robe bottom / skirt -->
  <path d="M32 110 Q30 170 28 170 L92 170 Q90 170 88 110 Q75 105 60 105 Q45 105 32 110Z" fill="url(#robe)" stroke="#3a2a5a" stroke-width="0.5"/>
  <!-- Robe front fold -->
  <line x1="60" y1="105" x2="60" y2="170" stroke="#3a2a5a" stroke-width="0.5"/>
  <!-- Torso -->
  <path d="M40 55 L40 108 Q40 112 60 112 Q80 112 80 108 L80 55 Q70 48 60 46 Q50 48 40 55Z" fill="url(#robe)" stroke="#3a2a5a" stroke-width="0.5"/>
  <!-- Sash / belt -->
  <path d="M40 90 Q50 94 60 92 Q70 94 80 90 L80 96 Q70 100 60 98 Q50 100 40 96Z" fill="#4a2a6a"/>
  <!-- Collar -->
  <path d="M44 50 Q52 56 60 54 Q68 56 76 50 L76 56 Q68 60 60 58 Q52 60 44 56Z" fill="#3a1a5a"/>
  <!-- Sleeves -->
  <path d="M40 58 L26 90 Q24 94 28 96 L36 94 Q38 92 38 88 L42 62Z" fill="url(#robe)" stroke="#3a2a5a" stroke-width="0.5"/>
  <path d="M80 58 L94 90 Q96 94 92 96 L84 94 Q82 92 82 88 L78 62Z" fill="url(#robe)" stroke="#3a2a5a" stroke-width="0.5"/>
  <!-- Hands -->
  <ellipse cx="28" cy="94" rx="5" ry="4" fill="#c9a070"/>
  <ellipse cx="92" cy="94" rx="5" ry="4" fill="#c9a070"/>
  <!-- Staff (held in right hand) -->
  <line x1="92" y1="92" x2="100" y2="10" stroke="#5a3a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="92" x2="100" y2="10" stroke="#7a5a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Staff orb -->
  <circle cx="100" cy="10" r="7" fill="url(#orb-glow)" stroke="#8855cc" stroke-width="0.5"/>
  <circle cx="100" cy="10" r="3" fill="#dd99ff" opacity="0.6"/>
  <!-- Hood -->
  <path d="M42 48 Q42 18 60 14 Q78 18 78 48 Q70 44 60 42 Q50 44 42 48Z" fill="#2a1a4a" stroke="#3a2a5a" stroke-width="0.5"/>
  <!-- Hood shadow -->
  <path d="M46 44 Q46 26 60 22 Q74 26 74 44 Q66 40 60 38 Q54 40 46 44Z" fill="#1a0a2a"/>
  <!-- Face -->
  <ellipse cx="60" cy="34" rx="10" ry="10" fill="#c9a070"/>
  <!-- Eyes (glowing) -->
  <ellipse cx="56" cy="32" rx="2" ry="1.5" fill="#aa66ff"/>
  <ellipse cx="64" cy="32" rx="2" ry="1.5" fill="#aa66ff"/>
  <!-- Beard -->
  <path d="M54 38 Q56 50 60 52 Q64 50 66 38" fill="#555" opacity="0.7"/>
</svg>