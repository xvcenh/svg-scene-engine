<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80"
  data-asset-id="animal-sheep"
  data-layer="character"
  data-tags="animal,sheep,livestock,farm,npc,idle"
  data-origin="center-bottom">
  <!-- Dark Fantasy Sheep -->
  <!-- Woolly body -->
  <ellipse cx="50" cy="42" rx="28" ry="20" fill="#8a8a8a"/>
  <!-- Wool texture circles -->
  <circle cx="35" cy="35" r="8" fill="#9a9a9a"/>
  <circle cx="50" cy="30" r="9" fill="#9a9a9a"/>
  <circle cx="65" cy="35" r="8" fill="#9a9a9a"/>
  <circle cx="38" cy="45" r="7" fill="#9a9a9a"/>
  <circle cx="55" cy="48" r="7" fill="#9a9a9a"/>
  <circle cx="62" cy="44" r="6" fill="#9a9a9a"/>
  <circle cx="45" cy="32" r="7" fill="#aaa"/>
  <circle cx="58" cy="33" r="7" fill="#aaa"/>
  <!-- Legs -->
  <rect x="34" y="55" width="5" height="18" rx="2" fill="#3a3a3a"/>
  <rect x="44" y="55" width="5" height="18" rx="2" fill="#3a3a3a"/>
  <rect x="54" y="55" width="5" height="18" rx="2" fill="#3a3a3a"/>
  <rect x="62" y="55" width="5" height="18" rx="2" fill="#3a3a3a"/>
  <!-- Hooves -->
  <rect x="33" y="71" width="7" height="4" rx="1" fill="#1a1a1a"/>
  <rect x="43" y="71" width="7" height="4" rx="1" fill="#1a1a1a"/>
  <rect x="53" y="71" width="7" height="4" rx="1" fill="#1a1a1a"/>
  <rect x="61" y="71" width="7" height="4" rx="1" fill="#1a1a1a"/>
  <!-- Head -->
  <ellipse cx="78" cy="32" rx="10" ry="12" fill="#4a4a4a"/>
  <!-- Ears -->
  <ellipse cx="72" cy="24" rx="5" ry="3" fill="#4a4a4a" transform="rotate(-20 72 24)"/>
  <ellipse cx="84" cy="24" rx="5" ry="3" fill="#4a4a4a" transform="rotate(20 84 24)"/>
  <!-- Wool on head -->
  <circle cx="75" cy="22" r="5" fill="#9a9a9a"/>
  <circle cx="80" cy="21" r="5" fill="#9a9a9a"/>
  <!-- Eyes -->
  <ellipse cx="75" cy="30" rx="2" ry="2.5" fill="#fff"/>
  <circle cx="75.5" cy="30" r="1.2" fill="#1a1a1a"/>
  <ellipse cx="83" cy="30" rx="2" ry="2.5" fill="#fff"/>
  <circle cx="83.5" cy="30" r="1.2" fill="#1a1a1a"/>
  <!-- Nose -->
  <ellipse cx="80" cy="36" rx="4" ry="2.5" fill="#3a3a3a"/>
  <!-- Mouth -->
  <path d="M77 38 Q80 40 83 38" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  <!-- Tail -->
  <ellipse cx="22" cy="38" rx="5" ry="6" fill="#9a9a9a"/>
</svg>