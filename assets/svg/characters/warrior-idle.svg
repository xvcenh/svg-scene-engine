<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180"
  data-asset-id="warrior-idle"
  data-layer="character"
  data-tags="warrior,knight,armored,npc,fighter,idle"
  data-origin="center-bottom">
  <!-- Dark Fantasy Armored Warrior -->
  <defs>
    <linearGradient id="armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a6e"/>
      <stop offset="50%" stop-color="#3a3a4e"/>
      <stop offset="100%" stop-color="#2a2a3e"/>
    </linearGradient>
    <linearGradient id="armor-highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6e6e82"/>
      <stop offset="100%" stop-color="#3a3a4e"/>
    </linearGradient>
  </defs>
  <!-- Legs / Greaves -->
  <rect x="42" y="120" width="14" height="40" rx="3" fill="#3a3a4e" stroke="#555" stroke-width="0.5"/>
  <rect x="64" y="120" width="14" height="40" rx="3" fill="#3a3a4e" stroke="#555" stroke-width="0.5"/>
  <!-- Boots -->
  <rect x="40" y="152" width="18" height="10" rx="2" fill="#2a2a2a"/>
  <rect x="62" y="152" width="18" height="10" rx="2" fill="#2a2a2a"/>
  <!-- Torso / Cuirass -->
  <path d="M38 70 L38 122 Q38 128 44 128 L76 128 Q82 128 82 122 L82 70 Q82 64 60 60 Q38 64 38 70Z" fill="url(#armor)" stroke="#555" stroke-width="0.8"/>
  <!-- Armor plate highlight -->
  <path d="M48 72 L72 72 L72 105 L48 105Z" fill="url(#armor-highlight)" opacity="0.3"/>
  <!-- Belt -->
  <rect x="38" y="105" width="44" height="6" rx="1" fill="#4a3a2a"/>
  <rect x="56" y="103" width="8" height="10" rx="1" fill="#c9a84c" stroke="#a08030" stroke-width="0.5"/>
  <!-- Shoulder pauldrons -->
  <ellipse cx="36" cy="68" rx="12" ry="8" fill="#4a4a5e" stroke="#555" stroke-width="0.5"/>
  <ellipse cx="84" cy="68" rx="12" ry="8" fill="#4a4a5e" stroke="#555" stroke-width="0.5"/>
  <!-- Arms -->
  <rect x="24" y="70" width="12" height="38" rx="4" fill="url(#armor)"/>
  <rect x="84" y="70" width="12" height="38" rx="4" fill="url(#armor)"/>
  <!-- Gauntlets -->
  <rect x="22" y="102" width="14" height="10" rx="3" fill="#4a4a5e"/>
  <rect x="84" y="102" width="14" height="10" rx="3" fill="#4a4a5e"/>
  <!-- Neck -->
  <rect x="52" y="50" width="16" height="12" rx="2" fill="#c9a070"/>
  <!-- Helmet -->
  <path d="M40 52 Q40 20 60 16 Q80 20 80 52 L76 54 Q76 40 60 36 Q44 40 44 54Z" fill="#4a4a5e" stroke="#555" stroke-width="0.8"/>
  <!-- Helmet visor -->
  <rect x="44" y="36" width="32" height="8" rx="2" fill="#1a1a2e" stroke="#555" stroke-width="0.5"/>
  <!-- Visor slits -->
  <rect x="48" y="38" width="8" height="3" rx="0.5" fill="#6a4a1a"/>
  <rect x="64" y="38" width="8" height="3" rx="0.5" fill="#6a4a1a"/>
  <!-- Helmet crest -->
  <path d="M58 16 Q60 4 62 16" fill="#8b1a1a" stroke="#6b0a0a" stroke-width="0.5"/>
  <!-- Shield on back hint -->
  <ellipse cx="60" cy="88" rx="4" ry="12" fill="#3a3a4e" opacity="0.4"/>
</svg>