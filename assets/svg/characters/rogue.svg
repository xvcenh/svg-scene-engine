  <!-- Belt with pouches -->
  <rect x="40" y="88" width="40" height="5" fill="#4a3a2a"/>
  <rect x="44" y="93" width="8" height="8" rx="2" fill="#5a4a30"/>
  <rect x="68" y="93" width="8" height="8" rx="2" fill="#5a4a30"/>
  <!-- Legs -->
  <rect x="46" y="103" width="12" height="32" rx="3" fill="#2a2a3a"/>
  <rect x="62" y="103" width="12" height="32" rx="3" fill="#2a2a3a"/>
  <!-- Soft boots -->
  <rect x="44" y="132" width="16" height="8" rx="3" fill="#2a2020"/>
  <rect x="60" y="132" width="16" height="8" rx="3" fill="#2a2020"/>
  <!-- Daggers -->
  <rect x="28" y="60" width="3" height="28" rx="1" fill="#b0b0c0"/>
  <rect x="89" y="60" width="3" height="28" rx="1" fill="#b0b0c0"/>
  <!-- Hood -->
  <path d="M40,25 Q60,5 80,25 L85,50 L35,50 Z" fill="#2a2a3a"/>
