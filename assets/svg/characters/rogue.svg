  <rect x="46" y="32" width="28" height="8" fill="#2a2a3a"/>
  <!-- Eyes gleaming -->
  <circle cx="54" cy="40" r="2" fill="#aaffaa"/>
  <circle cx="66" cy="40" r="2" fill="#aaffaa"/>
