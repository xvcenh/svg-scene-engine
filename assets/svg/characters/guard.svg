<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" data-asset-id="char-guard" data-layer="character" data-tags="guard,sentinel,patrol,soldier">
  <!-- Body (leather armor) -->
  <rect x="38" y="55" width="44" height="55" rx="5" fill="#6b4a20"/>
  <rect x="40" y="57" width="40" height="10" rx="2" fill="#7a5a30"/>
  <!-- Belt -->
  <rect x="38" y="95" width="44" height="6" fill="#3a2a1a"/>
  <!-- Legs -->
  <rect x="44" y="110" width="14" height="35" rx="3" fill="#4a3a20"/>
  <rect x="62" y="110" width="14" height="35" rx="3" fill="#4a3a20"/>
  <!-- Boots -->
  <rect x="42" y="140" width="18" height="12" rx="3" fill="#2a1a0a"/>
  <rect x="60" y="140" width="18" height="12" rx="3" fill="#2a1a0a"/>
