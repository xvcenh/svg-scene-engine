  <!-- Cape -->
  <path d="M38,55 L28,130 L40,130 Z" fill="#2a5a2a" opacity="0.7"/>
  <path d="M82,55 L92,130 L80,130 Z" fill="#2a5a2a" opacity="0.7"/>
